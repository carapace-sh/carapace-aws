# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: bcm-dashboards
description: AWS Billing and Cost Management Dashboards
commands:
    - name: create-dashboard
      description: Creates a new dashboard that can contain multiple widgets displaying cost and usage data.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --description=: A description of the dashboard's purpose or contents.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the dashboard.
        --resource-tags=:
            description: The tags to apply to the dashboard resource for organization and management.
            nargs: -1
        --widgets=!:
            description: An array of widget configurations that define the visualizations to be displayed in the dashboard.
            nargs: -1
    - name: create-scheduled-report
      description: Creates a new scheduled report for a dashboard.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-tags=:
            description: The tags to apply to the scheduled report resource for organization and management.
            nargs: -1
        --scheduled-report=!: The configuration for the scheduled report, including the dashboard to report on, the schedule, and the execution role that the service will use to generate the dashboard snapshot.
    - name: delete-dashboard
      description: Deletes a specified dashboard.
      flags:
        --arn=!: The ARN of the dashboard to be deleted.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-scheduled-report
      description: Deletes a specified scheduled report.
      flags:
        --arn=!: The ARN of the scheduled report to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: execute-scheduled-report
      description: Triggers an immediate execution of a scheduled report, outside of its regular schedule.
      flags:
        --arn=!: The ARN of the scheduled report to execute.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --dry-run: When set to `true`, validates the scheduled report configuration without triggering an actual execution.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --no-dry-run: When set to `true`, validates the scheduled report configuration without triggering an actual execution.
    - name: get-dashboard
      description: Retrieves the configuration and metadata of a specified dashboard, including its widgets and layout settings.
      flags:
        --arn=!: The ARN of the dashboard to retrieve.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-resource-policy
      description: Retrieves the resource-based policy attached to a dashboard, showing sharing configurations and permissions.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The ARN of the dashboard whose resource-based policy you want to retrieve.
    - name: get-scheduled-report
      description: Retrieves the configuration and metadata of a specified scheduled report.
      flags:
        --arn=!: The ARN of the scheduled report to retrieve.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: list-dashboards
      description: Returns a list of all dashboards in your account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-scheduled-reports
      description: Returns a list of scheduled reports in your account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-tags-for-resource
      description: Returns a list of all tags associated with a specified dashboard resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The unique identifier for the resource.
    - name: tag-resource
      description: Adds or updates tags for a specified dashboard resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The unique identifier for the resource.
        --resource-tags=!:
            description: The tags to add to the dashboard resource.
            nargs: -1
    - name: untag-resource
      description: Removes specified tags from a dashboard resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The unique identifier for the resource.
        --resource-tag-keys=!:
            description: The keys of the tags to remove from the dashboard resource.
            nargs: -1
    - name: update-dashboard
      description: Updates an existing dashboard's properties, including its name, description, and widget configurations.
      flags:
        --arn=!: The ARN of the dashboard to update.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --description=: The new description for the dashboard.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The new name for the dashboard.
        --widgets=:
            description: The updated array of widget configurations for the dashboard.
            nargs: -1
    - name: update-scheduled-report
      description: Updates an existing scheduled report's properties, including its name, description, schedule configuration, and widget settings.
      flags:
        --arn=!: The ARN of the scheduled report to update.
        --clear-widget-date-range-override: Set to true to clear existing widgetDateRangeOverride.
        --clear-widget-ids: Set to true to clear existing widgetIds.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --dashboard-arn=: The ARN of the dashboard to associate with the scheduled report.
        --description=: The new description for the scheduled report.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=: The new name for the scheduled report.
        --no-clear-widget-date-range-override: Set to true to clear existing widgetDateRangeOverride.
        --no-clear-widget-ids: Set to true to clear existing widgetIds.
        --schedule-config=: The updated schedule configuration for the report.
        --scheduled-report-execution-role-arn=: The ARN of the IAM role that the scheduled report uses to execute.
        --widget-date-range-override=: The date range override to apply to widgets in the scheduled report.
        --widget-ids=:
            description: The list of widget identifiers to include in the scheduled report.
            nargs: -1
