# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: agenttoolkit
description: AgentToolkit
commands:
    - name: get-latest-skill-version
      description: Returns the latest version identifier for a skill as a plain-text file.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: ""
    - name: get-skill
      description: Retrieves metadata for a skill, including its version, description, categories, and file list.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: ""
        --skill-version=: ""
    - name: get-skill-file
      description: Returns a specific file from a skill version.
      flags:
        --file-path=!: ""
        --name=!: ""
        --skill-version=!: ""
      completion:
        positional:
            - - $files
    - name: get-skill-file-checksum
      description: Returns the SHA-256 hex checksum of a specific file from a skill version.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --file-path=!: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: ""
        --skill-version=!: ""
    - name: list-skills
      description: Lists skills available in the remote catalog.
      flags:
        --category-filter=: ""
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: ""
        --next-token=: ""
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: search-skills
      description: Searches the remote catalog for skills matching a query.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: ""
        --next-token=: ""
        --page-size=: The size of each page to get in the AWS service call.
        --query=!: ""
        --starting-token=: A token to specify where to start paginating.
