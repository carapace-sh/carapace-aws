# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: cloudtrail-data
description: AWS CloudTrail Data Service
commands:
    - name: put-audit-events
      description: Ingests your application events into CloudTrail Lake.
      flags:
        --audit-events=!:
            description: The JSON payload of events that you want to ingest.
            nargs: -1
        --channel-arn=!: The ARN or ID (the ARN suffix) of a channel.
        --cli-error-format=: The formatting style for error output
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --external-id=: A unique identifier that is conditionally required when the channel's resource policy includes an external ID.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
      completion:
        flag:
            cli-error-format:
                - legacy
                - json
                - yaml
                - text
                - table
                - enhanced
