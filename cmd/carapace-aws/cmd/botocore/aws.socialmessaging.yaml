# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: socialmessaging
description: AWS End User Messaging Social
commands:
    - name: associate-whatsapp-business-account
      description: This is only used through the Amazon Web Services console during sign-up to associate your WhatsApp Business Account to your Amazon Web Services account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --setup-finalization=: A JSON object that contains the phone numbers and WhatsApp Business Account to link to your account.
        --signup-callback=: Contains the callback access token.
    - name: create-whats-app-flow
      description: Creates a new WhatsApp Flow.
      flags:
        --categories=!:
            description: The categories that classify the business purpose of the Flow.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --clone-flow-id=: The ID of an existing Flow within the same WhatsApp Business Account to clone.
        --flow-json=: The Flow JSON definition that describes the screens, components, and logic of the Flow.
        --flow-name=!: The name of the Flow.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account to associate with this Flow.
        --no-publish: Set to `true` to publish the Flow immediately after creation.
        --publish: Set to `true` to publish the Flow immediately after creation.
    - name: create-whatsapp-message-template
      description: Creates a new WhatsApp message template from a custom definition.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account to associate with this template.
        --template-definition=!: The complete template definition as a JSON blob.
    - name: create-whatsapp-message-template-from-library
      description: Creates a new WhatsApp message template using a template from Meta's template library.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account to associate with this template.
        --meta-library-template=!: The template configuration from Meta's library, including customizations for buttons and body text.
    - name: create-whatsapp-message-template-media
      description: Uploads media for use in a WhatsApp message template.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this media upload.
        --source-s3-file=: ""
    - name: delete-whats-app-flow
      description: Deletes a WhatsApp Flow permanently.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --flow-id=!: The unique identifier of the Flow to delete.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this Flow.
    - name: delete-whatsapp-message-media
      description: Delete a media object from the WhatsApp service.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --media-id=!: The unique identifier of the media file to delete.
        --origination-phone-number-id=!: The unique identifier of the originating phone number associated with the media.
    - name: delete-whatsapp-message-template
      description: Deletes a WhatsApp message template.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --delete-all-languages: If true, deletes all language versions of the template.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this template.
        --meta-template-id=: The numeric ID of the template assigned by Meta.
        --no-delete-all-languages: If true, deletes all language versions of the template.
        --template-name=!: The name of the template to delete.
    - name: deprecate-whats-app-flow
      description: Deprecates a published WhatsApp Flow, marking it as no longer recommended for use.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --flow-id=!: The unique identifier of the Flow to deprecate.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this Flow.
    - name: disassociate-whatsapp-business-account
      description: Disassociate a WhatsApp Business Account (WABA) from your Amazon Web Services account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The unique identifier of your WhatsApp Business Account.
    - name: get-linked-whatsapp-business-account
      description: Get the details of your linked WhatsApp Business Account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The unique identifier, from Amazon Web Services, of the linked WhatsApp Business Account.
    - name: get-linked-whatsapp-business-account-phone-number
      description: Retrieve the WABA account id and phone number details of a WhatsApp business account phone number.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The unique identifier of the phone number.
    - name: get-whats-app-flow
      description: Retrieves the metadata and status of a WhatsApp Flow, including validation errors, preview information, and health status.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --flow-id=!: The unique identifier of the Flow to retrieve.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this Flow.
    - name: get-whats-app-flow-preview
      description: Generates a web preview URL for testing a WhatsApp Flow before publishing.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --flow-id=!: The unique identifier of the Flow to preview.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this Flow.
        --invalidate: Set to `true` to force generation of a new preview URL.
        --no-invalidate: Set to `true` to force generation of a new preview URL.
    - name: get-whatsapp-message-media
      description: Get a media file from the WhatsApp service.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --destination-s3-file=: The `bucketName` and `key` of the S3 media file.
        --destination-s3-presigned-url=: The presign url of the media file.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --media-id=!: The unique identifier for the media file.
        --metadata-only: Set to `True` to get only the metadata for the file.
        --no-metadata-only: Set to `True` to get only the metadata for the file.
        --origination-phone-number-id=!: The unique identifier of the originating phone number for the WhatsApp message media.
    - name: get-whatsapp-message-template
      description: Retrieves a specific WhatsApp message template.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this template.
        --meta-template-id=: The numeric ID of the template assigned by Meta.
        --template-language-code=: The language code of the message template (for example, `en` or `en_US`).
        --template-name=: The name of the message template.
    - name: list-linked-whatsapp-business-accounts
      description: List all WhatsApp Business Accounts linked to your Amazon Web Services account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return.
        --next-token=: The next token for pagination.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-tags-for-resource
      description: List all tags associated with a resource, such as a phone number or WABA.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The Amazon Resource Name (ARN) of the resource to retrieve the tags from.
    - name: list-whats-app-flow-assets
      description: Lists the assets (Flow JSON definition) of a WhatsApp Flow with presigned download URLs.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --flow-id=!: The unique identifier of the Flow whose assets to list.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this Flow.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return per page.
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-whats-app-flows
      description: Lists all WhatsApp Flows for a WhatsApp Business Account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account to list Flows for.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return per page.
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-whatsapp-message-templates
      description: Lists WhatsApp message templates for a specific WhatsApp Business Account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account to list templates for.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return per page (1-100).
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-whatsapp-template-library
      description: Lists templates available in Meta's template library for WhatsApp messaging.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --filters=: Map of filters to apply (searchKey, topic, usecase, industry, language).
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account to list library templates for.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return per page (1-100).
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: post-whatsapp-message-media
      description: Upload a media file to the WhatsApp service.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --origination-phone-number-id=!: The ID of the phone number to associate with the WhatsApp media file.
        --source-s3-file=: The source S3 url for the media file.
        --source-s3-presigned-url=: The source presign url of the media file.
    - name: publish-whats-app-flow
      description: Publishes a WhatsApp Flow, making it available for use in template messages.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --flow-id=!: The unique identifier of the Flow to publish.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this Flow.
    - name: put-whatsapp-business-account-event-destinations
      description: Add an event destination to log event data from WhatsApp for a WhatsApp Business Account (WABA).
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --event-destinations=!:
            description: An array of `WhatsAppBusinessAccountEventDestination` event destinations.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The unique identifier of your WhatsApp Business Account.
    - name: send-whatsapp-message
      description: Send a WhatsApp message.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --message=!: The message to send through WhatsApp.
        --meta-api-version=!: The API version for the request formatted as `v{VersionNumber}`.
        --origination-phone-number-id=!: The ID of the phone number used to send the WhatsApp message.
    - name: tag-resource
      description: Adds or overwrites only the specified tags for the specified resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The Amazon Resource Name (ARN) of the resource to tag.
        --tags=!:
            description: The tags to add to the resource.
            nargs: -1
    - name: untag-resource
      description: Removes the specified tags from a resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The Amazon Resource Name (ARN) of the resource to remove tags from.
        --tag-keys=!:
            description: The keys of the tags to remove from the resource.
            nargs: -1
    - name: update-whats-app-flow
      description: Updates the metadata of a WhatsApp Flow, such as its name or categories.
      flags:
        --categories=:
            description: The updated categories for the Flow.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --flow-id=!: The unique identifier of the Flow to update.
        --flow-name=: The updated name for the Flow.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this Flow.
    - name: update-whats-app-flow-assets
      description: Updates the Flow JSON definition (assets) of a WhatsApp Flow.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --flow-id=!: The unique identifier of the Flow whose assets to update.
        --flow-json=!: The updated Flow JSON definition.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this Flow.
    - name: update-whatsapp-message-template
      description: Updates an existing WhatsApp message template.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --cta-url-link-tracking-opted-out: When true, disables click tracking for call-to-action URL buttons in the template.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --id=!: The ID of the WhatsApp Business Account associated with this template.
        --meta-template-id=: The numeric ID of the template assigned by Meta.
        --no-cta-url-link-tracking-opted-out: When true, disables click tracking for call-to-action URL buttons in the template.
        --parameter-format=: The format specification for parameters in the template, this can be either 'named' or 'positional'.
        --template-category=: The new category for the template (for example, UTILITY or MARKETING).
        --template-components=: The updated components of the template as a JSON blob (maximum 3000 characters).
        --template-language-code=: The language code of the message template (for example, `en` or `en_US`).
        --template-name=: The name of the message template.
