# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: billing
description: AWS Billing
commands:
    - name: associate-source-views
      description: Associates one or more source billing views with an existing billing view.
      flags:
        --arn=!: The Amazon Resource Name (ARN) of the billing view to associate source views with.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --source-views=!:
            description: A list of ARNs of the source billing views to associate.
            nargs: -1
    - name: create-billing-view
      description: Creates a billing view with the specified billing view attributes.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier you specify to ensure idempotency of the request.
        --data-filter-expression=: See [Expression](https://docs.aws.amazon.com/aws-cost-management/latest/APIReference/API_billing_Expression.html).
        --description=: The description of the billing view.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the billing view.
        --resource-tags=:
            description: A list of key value map specifying tags associated to the billing view being created.
            nargs: -1
        --source-views=!:
            description: A list of billing views used as the data source for the custom billing view.
            nargs: -1
    - name: delete-billing-view
      description: Deletes the specified billing view.
      flags:
        --arn=!: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --force: If set to true, forces deletion of the billing view even if it has derived resources (e.g. other billing views or budgets).
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --no-force: If set to true, forces deletion of the billing view even if it has derived resources (e.g. other billing views or budgets).
    - name: disassociate-source-views
      description: Removes the association between one or more source billing views and an existing billing view.
      flags:
        --arn=!: The Amazon Resource Name (ARN) of the billing view to disassociate source views from.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --source-views=!:
            description: A list of ARNs of the source billing views to disassociate.
            nargs: -1
    - name: get-billing-preferences
      description: Retrieves billing preferences for the specified feature.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --features=!:
            description: The feature to retrieve.
            nargs: -1
        --filters=:
            description: Filters to narrow results.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-results=: The maximum number of records to return per page.
        --next-token=: Pagination token from a previous response.
    - name: get-billing-view
      description: Returns the metadata associated to the specified billing view ARN.
      flags:
        --arn=!: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-credit-allocation-history
      description: Returns the per-billing-month allocation history for credits applied to an Amazon Web Services account's bills.
      flags:
        --account-id=!: The Amazon Web Services account ID whose allocation history to retrieve.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --credit-id=: Filters the result to a single credit.
        --end-date=!: Inclusive end date as Unix epoch seconds.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of records to return per page.
        --next-token=: Pagination token from a previous response.
        --page-size=: The size of each page to get in the AWS service call.
        --start-date=!: Inclusive start date as Unix epoch seconds.
        --starting-token=: A token to specify where to start paginating.
    - name: get-credits
      description: Returns the list of Amazon Web Services account credits for the specified account.
      flags:
        --account-id=!: The Amazon Web Services account ID.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --end-date=: The end date for the credit period as Unix epoch seconds.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --no-payer-account-flag: When `true` and the caller is the management account, the response aggregates credits across the entire consolidated billing family.
        --payer-account-flag: When `true` and the caller is the management account, the response aggregates credits across the entire consolidated billing family.
        --start-date=!: The start date for the credit period as Unix epoch seconds.
    - name: get-resource-policy
      description: Returns the resource-based policy document attached to the resource in `JSON` format.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The Amazon Resource Name (ARN) of the billing view resource to which the policy is attached to.
    - name: list-billing-views
      description: Lists the billing views available for a given time period.
      flags:
        --active-time-range=: The time range for the billing views listed.
        --arns=:
            description: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
            nargs: -1
        --billing-view-types=:
            description: The type of billing view.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of billing views to retrieve.
        --names=:
            description: Filters the list of billing views by name.
            nargs: -1
        --next-token=: The pagination token that is used on subsequent calls to list billing views.
        --owner-account-id=: The list of owners of the billing view.
        --page-size=: The size of each page to get in the AWS service call.
        --source-account-id=: Filters the results to include only billing views that use the specified account as a source.
        --starting-token=: A token to specify where to start paginating.
    - name: list-source-views-for-billing-view
      description: Lists the source views (managed Amazon Web Services billing views) associated with the billing view.
      flags:
        --arn=!: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The number of entries a paginated response contains.
        --next-token=: The pagination token that is used on subsequent calls to list billing views.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-tags-for-resource
      description: Lists tags associated with the billing view resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The Amazon Resource Name (ARN) of the resource.
    - name: redeem-credits
      description: Redeems an Amazon Web Services promotional credit code on behalf of the calling account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --promo-code=!: The promotional credit code to redeem.
    - name: tag-resource
      description: An API operation for adding one or more tags (key-value pairs) to a resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The Amazon Resource Name (ARN) of the resource.
        --resource-tags=!:
            description: A list of tag key value pairs that are associated with the resource.
            nargs: -1
    - name: untag-resource
      description: Removes one or more tags from a resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The Amazon Resource Name (ARN) of the resource.
        --resource-tag-keys=!:
            description: A list of tag key value pairs that are associated with the resource.
            nargs: -1
    - name: update-billing-preferences
      description: Updates billing preferences for the specified feature.
      flags:
        --billing-preferences-per-key=!:
            description: Key/value pairs to apply.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --feature=!: The feature to update.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
      completion:
        flag:
            feature:
                - RI_SHARING
                - RI_SHARING_HISTORY
                - CREDIT_SHARING
                - CREDIT_SHARING_HISTORY
                - CREDIT_LEVEL_SHARING
                - BILLING_ALERTS
                - CREDIT_PREFERENCE_OPTIONS
    - name: update-billing-view
      description: An API to update the attributes of the billing view.
      flags:
        --arn=!: The Amazon Resource Name (ARN) that can be used to uniquely identify the billing view.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --data-filter-expression=: See [Expression](https://docs.aws.amazon.com/aws-cost-management/latest/APIReference/API_billing_Expression.html).
        --description=: The description of the billing view.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=: The name of the billing view.
