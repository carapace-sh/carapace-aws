# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: marketplace-discovery
description: AWS Marketplace Discovery
commands:
    - name: get-listing
      description: Provides details about a listing, such as descriptions, badges, categories, pricing model summaries, reviews, and associated products and offers.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --listing-id=!: The unique identifier of the listing to retrieve.
    - name: get-offer
      description: Provides details about an offer, such as the pricing model, seller of record, availability dates, badges, and associated products.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --offer-id=!: The unique identifier of the offer to retrieve.
    - name: get-offer-set
      description: Provides details about an offer set, which is a bundle of offers across multiple products.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --offer-set-id=!: The unique identifier of the offer set to retrieve.
    - name: get-offer-terms
      description: Returns the terms attached to an offer, such as pricing terms (usage-based, contract, BYOL, free trial), legal terms, payment schedules, validity terms, support terms, and renewal terms.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results that are returned per call.
        --next-token=: If `nextToken` is returned, there are more results available.
        --offer-id=!: The unique identifier of the offer whose terms to retrieve.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: get-product
      description: Provides details about a product, such as descriptions, highlights, categories, fulfillment option summaries, promotional media, and seller engagement options.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --product-id=!: The unique identifier of the product to retrieve.
    - name: list-fulfillment-options
      description: Returns the fulfillment options available for a product, including deployment details such as version information, operating systems, usage instructions, and release notes.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results that are returned per call.
        --next-token=: If `nextToken` is returned, there are more results available.
        --page-size=: The size of each page to get in the AWS service call.
        --product-id=!: The unique identifier of the product for which to list fulfillment options.
        --starting-token=: A token to specify where to start paginating.
    - name: list-purchase-options
      description: Returns the purchase options (offers and offer sets) available to the buyer.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --filters=:
            description: Filters to narrow the results.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results that are returned per call.
        --next-token=: If `nextToken` is returned, there are more results available.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: search-facets
      description: Returns available facet values for filtering listings, such as categories, pricing models, fulfillment option types, publishers, and customer ratings.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --facet-types=:
            description: A list of specific facet types to retrieve.
            nargs: -1
        --filters=:
            description: Filters to apply before retrieving facets.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --next-token=: If `nextToken` is returned, there are more results available.
        --search-text=: The search query text to filter listings before retrieving facets.
        --starting-token=: A token to specify where to start paginating.
    - name: search-listings
      description: Returns a list of product listings based on search criteria and filters.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --filters=:
            description: Filters to narrow search results.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results that are returned per call.
        --next-token=: If `nextToken` is returned, there are more results available.
        --page-size=: The size of each page to get in the AWS service call.
        --search-text=: The search query text to find relevant listings.
        --sort-by=: The field to sort results by.
        --sort-order=: The sort direction.
        --starting-token=: A token to specify where to start paginating.
      completion:
        flag:
            sort-by:
                - RELEVANCE
                - AVERAGE_CUSTOMER_RATING
            sort-order:
                - DESCENDING
                - ASCENDING
