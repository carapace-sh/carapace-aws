# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: securityagent
description: AWS Security Agent
commands:
    - name: add-artifact
      description: Uploads an artifact to an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to add the artifact to.
        --artifact-content=!: The binary content of the artifact to upload.
        --artifact-type=!: The file type of the artifact.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --file-name=!: The file name of the artifact.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
      completion:
        flag:
            artifact-type:
                - TXT
                - PNG
                - JPEG
                - MD
                - PDF
                - DOCX
                - DOC
                - JSON
                - YAML
    - name: batch-delete-pentests
      description: Deletes one or more pentests from an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space that contains the pentests to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --pentest-ids=!:
            description: The list of pentest identifiers to delete.
            nargs: -1
    - name: batch-get-agent-spaces
      description: Retrieves information about one or more agent spaces.
      flags:
        --agent-space-ids=!:
            description: The list of agent space identifiers to retrieve.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: batch-get-artifact-metadata
      description: Retrieves metadata for one or more artifacts in an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space that contains the artifacts.
        --artifact-ids=!:
            description: The list of artifact identifiers to retrieve metadata for.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: batch-get-findings
      description: Retrieves information about one or more security findings in an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space that contains the findings.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --finding-ids=!:
            description: The list of finding identifiers to retrieve.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: batch-get-pentest-job-tasks
      description: Retrieves information about one or more tasks within a pentest job.
      flags:
        --agent-space-id=!: The unique identifier of the agent space that contains the tasks.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --task-ids=!:
            description: The list of task identifiers to retrieve.
            nargs: -1
    - name: batch-get-pentest-jobs
      description: Retrieves information about one or more pentest jobs in an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space that contains the pentest jobs.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --pentest-job-ids=!:
            description: The list of pentest job identifiers to retrieve.
            nargs: -1
    - name: batch-get-pentests
      description: Retrieves information about one or more pentests in an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space that contains the pentests.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --pentest-ids=!:
            description: The list of pentest identifiers to retrieve.
            nargs: -1
    - name: batch-get-target-domains
      description: Retrieves information about one or more target domains.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --target-domain-ids=!:
            description: The list of target domain identifiers to retrieve.
            nargs: -1
    - name: create-agent-space
      description: Creates a new agent space.
      flags:
        --aws-resources=: The AWS resources to associate with the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --code-review-settings=: The code review settings for the agent space.
        --description=: A description of the agent space.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-id=: The identifier of the AWS KMS key to use for encrypting data in the agent space.
        --name=!: The name of the agent space.
        --tags=: The tags to associate with the agent space.
        --target-domain-ids=:
            description: The list of target domain identifiers to associate with the agent space.
            nargs: -1
    - name: create-application
      description: Creates a new application.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --default-kms-key-id=: The identifier of the default AWS KMS key to use for encrypting data in the application.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --idc-instance-arn=: The Amazon Resource Name (ARN) of the IAM Identity Center instance to associate with the application.
        --role-arn=: The Amazon Resource Name (ARN) of the IAM role to associate with the application.
        --tags=: The tags to associate with the application.
    - name: create-integration
      description: Creates a new integration with a third-party provider, such as GitHub, for code review and remediation.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --input=!: The provider-specific input required to create the integration.
        --integration-display-name=!: The display name for the integration.
        --kms-key-id=: The identifier of the AWS KMS key to use for encrypting data associated with the integration.
        --provider=!: The integration provider.
        --tags=: The tags to associate with the integration.
      completion:
        flag:
            provider:
                - GITHUB
    - name: create-membership
      description: Creates a new membership, granting a user access to an agent space within an application.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to grant access to.
        --application-id=!: The unique identifier of the application that contains the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --config=: The configuration for the membership, such as the user role.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --member-type=!: The type of member.
        --membership-id=!: The unique identifier for the membership.
      completion:
        flag:
            member-type:
                - USER
    - name: create-pentest
      description: Creates a new pentest configuration in an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to create the pentest in.
        --assets=: The assets to include in the pentest, such as endpoints, actors, documents, and source code.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --code-remediation-strategy=: The code remediation strategy for the pentest.
        --exclude-risk-types=:
            description: The list of risk types to exclude from the pentest.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --log-config=: The CloudWatch Logs configuration for the pentest.
        --network-traffic-config=: The network traffic configuration for the pentest, including custom headers and traffic rules.
        --service-role=: The IAM service role to use for the pentest.
        --title=!: The title of the pentest.
        --vpc-config=: The VPC configuration for the pentest.
      completion:
        flag:
            code-remediation-strategy:
                - AUTOMATIC
                - DISABLED
    - name: create-target-domain
      description: Creates a new target domain for penetration testing.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --tags=: The tags to associate with the target domain.
        --target-domain-name=!: The domain name to register as a target domain.
        --verification-method=!: The method to use for verifying domain ownership.
      completion:
        flag:
            verification-method:
                - DNS_TXT
                - HTTP_ROUTE
                - PRIVATE_VPC
    - name: delete-agent-space
      description: Deletes an agent space and all of its associated resources, including pentests, findings, and artifacts.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-application
      description: Deletes an application and its associated configuration, including IAM Identity Center settings.
      flags:
        --application-id=!: The unique identifier of the application to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-artifact
      description: Deletes an artifact from an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space that contains the artifact.
        --artifact-id=!: The unique identifier of the artifact to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-integration
      description: Deletes an integration with a third-party provider.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --integration-id=!: The unique identifier of the integration to delete.
    - name: delete-membership
      description: Deletes a membership, revoking a user's access to an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to revoke access from.
        --application-id=!: The unique identifier of the application that contains the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --member-type=: The type of member to remove.
        --membership-id=!: The unique identifier of the membership to delete.
      completion:
        flag:
            member-type:
                - USER
    - name: delete-target-domain
      description: Deletes a target domain registration.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --target-domain-id=!: The unique identifier of the target domain to delete.
    - name: get-application
      description: Retrieves information about an application.
      flags:
        --application-id=!: The unique identifier of the application to retrieve.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-artifact
      description: Retrieves an artifact from an agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space that contains the artifact.
        --artifact-id=!: The unique identifier of the artifact to retrieve.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-integration
      description: Retrieves information about an integration.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --integration-id=!: The unique identifier of the integration to retrieve.
    - name: initiate-provider-registration
      description: Initiates the OAuth registration flow with a third-party provider.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --provider=!: The provider to initiate registration with.
      completion:
        flag:
            provider:
                - GITHUB
    - name: list-agent-spaces
      description: Returns a paginated list of agent space summaries in your account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-applications
      description: Returns a paginated list of application summaries in your account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-artifacts
      description: Returns a paginated list of artifact summaries for the specified agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to list artifacts for.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-discovered-endpoints
      description: Returns a paginated list of endpoints discovered during a pentest job execution.
      flags:
        --agent-space-id=!: The unique identifier of the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --pentest-job-id=!: The unique identifier of the pentest job to list discovered endpoints for.
        --prefix=: A prefix to filter discovered endpoints by URI.
        --starting-token=: A token to specify where to start paginating.
    - name: list-findings
      description: Lists the security findings for a pentest job.
      flags:
        --agent-space-id=!: The unique identifier of the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --confidence=: Filter findings by confidence level.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --name=: Filter findings by name.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --pentest-job-id=!: The unique identifier of the pentest job to list findings for.
        --risk-level=: Filter findings by risk level.
        --risk-type=: Filter findings by risk type.
        --starting-token=: A token to specify where to start paginating.
        --status=: Filter findings by status.
      completion:
        flag:
            confidence:
                - FALSE_POSITIVE
                - UNCONFIRMED
                - LOW
                - MEDIUM
                - HIGH
            risk-level:
                - UNKNOWN
                - INFORMATIONAL
                - LOW
                - MEDIUM
                - HIGH
                - CRITICAL
            status:
                - ACTIVE
                - RESOLVED
                - ACCEPTED
                - FALSE_POSITIVE
    - name: list-integrated-resources
      description: Lists the integrated resources for an agent space, optionally filtered by integration or resource type.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to list integrated resources for.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --integration-id=: The unique identifier of the integration to filter by.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --resource-type=: The type of resource to filter by.
        --starting-token=: A token to specify where to start paginating.
      completion:
        flag:
            resource-type:
                - CODE_REPOSITORY
    - name: list-integrations
      description: Lists the integrations in your account, optionally filtered by provider or provider type.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --filter=: A filter to apply to the list of integrations.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-memberships
      description: Returns a paginated list of membership summaries for the specified agent space within an application.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to list memberships for.
        --application-id=!: The unique identifier of the application that contains the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --member-type=: Filter memberships by member type.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
      completion:
        flag:
            member-type:
                - USER
                - ALL
    - name: list-pentest-job-tasks
      description: Returns a paginated list of task summaries for the specified pentest job, optionally filtered by step name or category.
      flags:
        --agent-space-id=!: The unique identifier of the agent space.
        --category-name=: Filter tasks by category name.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --pentest-job-id=: The unique identifier of the pentest job to list tasks for.
        --starting-token=: A token to specify where to start paginating.
        --step-name=: Filter tasks by step name.
      completion:
        flag:
            step-name:
                - PREFLIGHT
                - STATIC_ANALYSIS
                - PENTEST
                - FINALIZING
    - name: list-pentest-jobs-for-pentest
      description: Returns a paginated list of pentest job summaries for the specified pentest configuration.
      flags:
        --agent-space-id=!: The unique identifier of the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --pentest-id=!: The unique identifier of the pentest to list jobs for.
        --starting-token=: A token to specify where to start paginating.
    - name: list-pentests
      description: Returns a paginated list of pentest summaries for the specified agent space.
      flags:
        --agent-space-id=!: The unique identifier of the agent space to list pentests for.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-tags-for-resource
      description: Returns the tags associated with the specified resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The Amazon Resource Name (ARN) of the resource to list tags for.
    - name: list-target-domains
      description: Returns a paginated list of target domain summaries in your account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: A token to use for paginating results that are returned in the response.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: start-code-remediation
      description: Initiates code remediation for one or more security findings.
      flags:
        --agent-space-id=!: The unique identifier of the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --finding-ids=!:
            description: The list of finding identifiers to initiate code remediation for.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --pentest-job-id=!: The unique identifier of the pentest job that produced the findings.
    - name: start-pentest-job
      description: Starts a new pentest job for a pentest configuration.
      flags:
        --agent-space-id=!: The unique identifier of the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --pentest-id=!: The unique identifier of the pentest to start a job for.
    - name: stop-pentest-job
      description: Stops a running pentest job.
      flags:
        --agent-space-id=!: The unique identifier of the agent space.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --pentest-job-id=!: The unique identifier of the pentest job to stop.
    - name: tag-resource
      description: Adds tags to a resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
