# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: acm
description: AWS Certificate Manager
commands:
    - name: add-tags-to-certificate
      description: Adds one or more tags to an ACM certificate.
      flags:
        --certificate-arn=!: String that contains the ARN of the ACM certificate to which the tag is to be applied.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --tags=!:
            description: The key-value pair that defines the tag.
            nargs: -1
    - name: create-acme-domain-validation
      description: Creates a domain validation for an ACME endpoint.
      flags:
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --domain-name=!: The domain name to validate.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --idempotency-token=: A unique, case-sensitive identifier to ensure idempotency of the request.
        --prevalidation-options=!: The prevalidation options for the domain.
        --tags=:
            description: One or more tags to associate with the domain validation.
            nargs: -1
    - name: create-acme-endpoint
      description: Creates an ACME endpoint, which is a managed ACME server with a unique endpoint URL.
      flags:
        --authorization-behavior=!: The authorization behavior for the ACME endpoint.
        --certificate-authority=!: The type of certificate authority to use for issuing certificates through this ACME endpoint.
        --certificate-tags=:
            description: Tags to apply to certificates issued through this ACME endpoint.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --contact=: Specifies whether ACME clients must provide contact information during account registration.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --idempotency-token=: A unique, case-sensitive identifier to ensure idempotency of the request.
        --tags=:
            description: One or more tags to associate with the ACME endpoint.
            nargs: -1
      completion:
        flag:
            authorization-behavior:
                - PRE_APPROVED
            contact:
                - REQUIRED
                - NOT_REQUIRED
    - name: create-acme-external-account-binding
      description: Creates an external account binding (EAB) for an ACME endpoint.
      flags:
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --expiration=: The expiration configuration for the external account binding.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --idempotency-token=: A unique, case-sensitive identifier to ensure idempotency of the request.
        --role-arn=!: The Amazon Resource Name (ARN) of the IAM role to associate with the external account binding.
        --tags=:
            description: One or more tags to associate with the external account binding.
            nargs: -1
    - name: delete-acme-domain-validation
      description: Deletes a domain validation.
      flags:
        --acme-domain-validation-arn=!: The Amazon Resource Name (ARN) of the ACME domain validation to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-acme-endpoint
      description: Deletes an ACME endpoint.
      flags:
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-acme-external-account-binding
      description: Deletes an external account binding.
      flags:
        --acme-external-account-binding-arn=!: The Amazon Resource Name (ARN) of the ACME external account binding to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-certificate
      description: Deletes a certificate and its associated private key.
      flags:
        --certificate-arn=!: String that contains the ARN of the ACM certificate to be deleted.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: describe-acme-account
      description: Returns detailed metadata about the specified ACME account, including its status, public key thumbprint, and associated external account binding.
      flags:
        --account-url=!: The URL of the ACME account.
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: describe-acme-domain-validation
      description: Returns detailed metadata about the specified domain validation, including its status, domain scope, and DNS resource records required for validation.
      flags:
        --acme-domain-validation-arn=!: The Amazon Resource Name (ARN) of the ACME domain validation.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: describe-acme-endpoint
      description: Returns detailed metadata about the specified ACME endpoint, including its status, URL, authorization behavior, and certificate authority configuration.
      flags:
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: describe-acme-external-account-binding
      description: Returns detailed metadata about the specified external account binding, including the associated IAM role, expiration time, and usage history.
      flags:
        --acme-external-account-binding-arn=!: The Amazon Resource Name (ARN) of the ACME external account binding.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: describe-certificate
      description: Returns detailed metadata about the specified ACM certificate.
      flags:
        --certificate-arn=!: The Amazon Resource Name (ARN) of the ACM certificate.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: export-certificate
      description: Exports a private certificate issued by a private certificate authority (CA) or a public certificate for use anywhere.
      flags:
        --certificate-arn=!: An Amazon Resource Name (ARN) of the issued certificate.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --passphrase=!: Passphrase to associate with the encrypted exported private key.
    - name: get-account-configuration
      description: Returns the account configuration options associated with an Amazon Web Services account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-acme-external-account-binding-credentials
      description: Retrieves the key ID and MAC key credentials for an external account binding.
      flags:
        --acme-external-account-binding-arn=!: The Amazon Resource Name (ARN) of the ACME external account binding.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-certificate
      description: Retrieves a certificate and its certificate chain.
      flags:
        --certificate-arn=!: 'String that contains a certificate ARN in the following format:'
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: import-certificate
      description: Imports a certificate into Certificate Manager (ACM) to use with services that are integrated with ACM.
      flags:
        --certificate-arn=: The [Amazon Resource Name (ARN)](https://docs.aws.amazon.com/general/latest/gr/aws-arns-and-namespaces.html) of an imported certificate to replace.
        --certificate-chain=: The PEM encoded certificate chain.
        --certificate=!: The certificate to import.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --private-key=!: The private key that matches the public key in the certificate.
        --tags=:
            description: One or more resource tags to associate with the imported certificate.
            nargs: -1
    - name: list-acme-accounts
      description: Retrieves a list of ACME accounts registered with the specified ACME endpoint.
      flags:
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return.
        --next-token=: A token for pagination.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-acme-domain-validations
      description: Retrieves a list of domain validations for the specified ACME endpoint.
      flags:
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return.
        --next-token=: A token for pagination.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-acme-endpoints
      description: Retrieves a list of ACME endpoints in your account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return.
        --next-token=: A token for pagination.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-acme-external-account-bindings
      description: Retrieves a list of external account bindings for the specified ACME endpoint.
      flags:
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return.
        --next-token=: A token for pagination.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-certificates
      description: Retrieves a list of certificate ARNs and domain names.
      flags:
        --certificate-key-pair-origins=:
            description: Filter the certificate list by certificate key pair origin.
            nargs: -1
        --certificate-statuses=:
            description: Filter the certificate list by status value.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --includes=: Filter the certificate list.
        --max-items=: Use this parameter when paginating results to specify the maximum number of items to return in the response.
        --next-token=: Use this parameter only when paginating results and only in a subsequent request after you receive a response with truncated results.
        --page-size=: The size of each page to get in the AWS service call.
        --sort-by=: Specifies the field to sort results by.
        --sort-order=: Specifies the order of sorted results.
        --starting-token=: A token to specify where to start paginating.
      completion:
        flag:
            sort-by:
                - CREATED_AT
            sort-order:
                - ASCENDING
                - DESCENDING
    - name: list-tags-for-certificate
      description: Lists the tags that have been applied to the ACM certificate.
      flags:
        --certificate-arn=!: String that contains the ARN of the ACM certificate for which you want to list the tags.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: list-tags-for-resource
      description: Lists the tags associated with an ACM resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The ARN of the ACM resource for which to list tags.
    - name: put-account-configuration
      description: Adds or modifies account-level configurations in ACM.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --expiry-events=: Specifies expiration events associated with an account.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --idempotency-token=!: Customer-chosen string used to distinguish between calls to `PutAccountConfiguration`.
    - name: remove-tags-from-certificate
      description: Remove one or more tags from an ACM certificate.
      flags:
        --certificate-arn=!: String that contains the ARN of the ACM Certificate with one or more tags that you want to remove.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --tags=!:
            description: The key-value pair that defines the tag to remove.
            nargs: -1
    - name: renew-certificate
      description: Renews an [eligible ACM certificate](https://docs.aws.amazon.com/acm/latest/userguide/managed-renewal.html).
      flags:
        --certificate-arn=!: String that contains the ARN of the ACM certificate to be renewed.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: request-certificate
      description: Requests an ACM certificate for use with other Amazon Web Services services.
      flags:
        --certificate-authority-arn=: The Amazon Resource Name (ARN) of the private certificate authority (CA) that will be used to issue the certificate.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --domain-name=!: Fully qualified domain name (FQDN), such as www.example.com, that you want to secure with an ACM certificate.
        --domain-validation-options=:
            description: The domain name that you want ACM to use to send you emails so that you can validate domain ownership.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --idempotency-token=: Customer chosen string that can be used to distinguish between calls to `RequestCertificate`.
        --key-algorithm=: Specifies the algorithm of the public and private key pair that your certificate uses to encrypt data.
        --managed-by=: Identifies the Amazon Web Services service that manages the certificate issued by ACM.
        --options=: You can use this parameter to specify whether to export your certificate.
        --subject-alternative-names=:
            description: Additional FQDNs to be included in the Subject Alternative Name extension of the ACM certificate.
            nargs: -1
        --tags=:
            description: One or more resource tags to associate with the certificate.
            nargs: -1
        --validation-method=: The method you want to use if you are requesting a public certificate to validate that you own or control domain.
      completion:
        flag:
            key-algorithm:
                - RSA_1024
                - RSA_2048
                - RSA_3072
                - RSA_4096
                - EC_prime256v1
                - EC_secp384r1
                - EC_secp521r1
            managed-by:
                - CLOUDFRONT
            validation-method:
                - EMAIL
                - DNS
                - HTTP
    - name: resend-validation-email
      description: Resends the email that requests domain ownership validation.
      flags:
        --certificate-arn=!: String that contains the ARN of the requested certificate.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --domain=!: The fully qualified domain name (FQDN) of the certificate that needs to be validated.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --validation-domain=!: The base validation domain that will act as the suffix of the email addresses that are used to send the emails.
    - name: revoke-acme-account
      description: Revokes an ACME account, preventing it from requesting or revoking certificates.
      flags:
        --account-url=!: The URL of the ACME account to revoke.
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: revoke-acme-external-account-binding
      description: Revokes an external account binding, preventing new ACME accounts from being registered using this binding.
      flags:
        --acme-external-account-binding-arn=!: The Amazon Resource Name (ARN) of the ACME external account binding to revoke.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: revoke-certificate
      description: Revokes a public ACM certificate.
      flags:
        --certificate-arn=!: The Amazon Resource Name (ARN) of the public or private certificate that will be revoked.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --revocation-reason=!: Specifies why you revoked the certificate.
      completion:
        flag:
            revocation-reason:
                - UNSPECIFIED
                - KEY_COMPROMISE
                - CA_COMPROMISE
                - AFFILIATION_CHANGED
                - SUPERCEDED
                - SUPERSEDED
                - CESSATION_OF_OPERATION
                - CERTIFICATE_HOLD
                - REMOVE_FROM_CRL
                - PRIVILEGE_WITHDRAWN
                - A_A_COMPROMISE
    - name: search-certificates
      description: Retrieves a list of certificates matching search criteria.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --filter-statement=: A filter statement that defines the search criteria.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in the response.
        --next-token=: Use this parameter only when paginating results and only in a subsequent request after you receive a response with truncated results.
        --page-size=: The size of each page to get in the AWS service call.
        --sort-by=: Specifies the field to sort results by.
        --sort-order=: Specifies the order of sorted results.
        --starting-token=: A token to specify where to start paginating.
      completion:
        flag:
            sort-by:
                - CREATED_AT
                - NOT_AFTER
                - STATUS
                - RENEWAL_STATUS
                - EXPORTED
                - IN_USE
                - NOT_BEFORE
                - KEY_ALGORITHM
                - TYPE
                - CERTIFICATE_ARN
                - COMMON_NAME
                - REVOKED_AT
                - RENEWAL_ELIGIBILITY
                - ISSUED_AT
                - MANAGED_BY
                - EXPORT_OPTION
                - VALIDATION_METHOD
                - IMPORTED_AT
                - ACME_ENDPOINT_ARN
                - ACME_ACCOUNT_ID
                - CERTIFICATE_KEY_PAIR_ORIGIN
            sort-order:
                - ASCENDING
                - DESCENDING
    - name: tag-resource
      description: Adds one or more tags to an ACM resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The ARN of the ACM resource to which the tag is to be applied.
        --tags=!:
            description: The key-value pair that defines the tag to apply.
            nargs: -1
    - name: untag-resource
      description: Removes one or more tags from an ACM resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The ARN of the ACM resource from which the tag is to be removed.
        --tag-keys=!:
            description: The key of each tag to remove.
            nargs: -1
    - name: update-acme-domain-validation
      description: Updates the prevalidation configuration of an existing domain validation.
      flags:
        --acme-domain-validation-arn=!: The Amazon Resource Name (ARN) of the ACME domain validation to update.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --prevalidation-options=: The updated prevalidation options.
    - name: update-acme-endpoint
      description: Updates the configuration of an existing ACME endpoint.
      flags:
        --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint to update.
        --authorization-behavior=: The updated authorization behavior.
        --certificate-authority=: The updated certificate authority configuration.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --contact=: The updated contact requirement.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
      completion:
        flag:
            authorization-behavior:
                - PRE_APPROVED
            contact:
                - REQUIRED
                - NOT_REQUIRED
    - name: update-certificate-options
      description: Updates a certificate.
      flags:
        --certificate-arn=!: ARN of the requested certificate to update.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --options=!: Use to update the options for your certificate.
    - name: wait
      description: Wait  until  a particular condition is satisfied.
      commands:
        - name: acme-domain-validation-deleted
          description: Returns detailed metadata about the specified domain validation, including its status, domain scope, and DNS resource records required for validation.
          flags:
            --acme-domain-validation-arn=!: The Amazon Resource Name (ARN) of the ACME domain validation.
            --cli-input-json=: Read arguments from the JSON string provided.
            --cli-input-yaml=: Read arguments from the YAML string provided.
            --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        - name: acme-domain-validation-validated
          description: Returns detailed metadata about the specified domain validation, including its status, domain scope, and DNS resource records required for validation.
          flags:
            --acme-domain-validation-arn=!: The Amazon Resource Name (ARN) of the ACME domain validation.
            --cli-input-json=: Read arguments from the JSON string provided.
            --cli-input-yaml=: Read arguments from the YAML string provided.
            --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        - name: acme-endpoint-active
          description: Returns detailed metadata about the specified ACME endpoint, including its status, URL, authorization behavior, and certificate authority configuration.
          flags:
            --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
            --cli-input-json=: Read arguments from the JSON string provided.
            --cli-input-yaml=: Read arguments from the YAML string provided.
            --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        - name: acme-endpoint-deleted
          description: Returns detailed metadata about the specified ACME endpoint, including its status, URL, authorization behavior, and certificate authority configuration.
          flags:
            --acme-endpoint-arn=!: The Amazon Resource Name (ARN) of the ACME endpoint.
            --cli-input-json=: Read arguments from the JSON string provided.
            --cli-input-yaml=: Read arguments from the YAML string provided.
            --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        - name: certificate-validated
          description: Returns detailed metadata about the specified ACM certificate.
          flags:
            --certificate-arn=!: The Amazon Resource Name (ARN) of the ACM certificate.
            --cli-input-json=: Read arguments from the JSON string provided.
            --cli-input-yaml=: Read arguments from the YAML string provided.
            --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
