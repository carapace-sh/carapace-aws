# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: signin
description: AWS Sign-In Service
commands:
    - name: create-o-auth2-token
      description: CreateOAuth2Token API
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --token-input=!: Flattened token operation inputs The specific operation is determined by grant\_type in the request body
    - name: delete-console-authorization-configuration
      description: Delete console authorization configuration with automatic scope detection
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --target-id=: Target account identifier
    - name: delete-resource-permission-statement
      description: Remove a permission statement from the account's SignIn resource-based policy
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: Idempotency token for the request
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --statement-id=!: Unique identifier of the permission statement to delete
    - name: get-console-authorization-configuration
      description: Get console authorization configuration with automatic scope detection
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --target-id=: Target account identifier
    - name: get-resource-policy
      description: Retrieve the account's consolidated SignIn resource-based policy
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: list-resource-permission-statements
      description: Retrieve all permission statements in the account's SignIn resource-based policy
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: Maximum number of results to return
        --next-token=: Token for pagination
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: put-console-authorization-configuration
      description: Enable console authorization configuration with automatic scope detection
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --target-id=: Target account identifier
    - name: put-resource-permission-statement
      description: Create a permission statement in the account's SignIn resource-based policy
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: Idempotency token for the request
        --console-source-vpce=: Console VPC endpoint identifier
        --excluded-principal=: Principal to exclude from the permission statement
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --requested-region=: AWS region where the VPC and VPC endpoint reside Required when sourceVpc or signinSourceVpce/consoleSourceVpce is provided
        --signin-source-vpce=: SignIn VPC endpoint identifier
        --source-ip=: Source IP address
        --source-vpc=: VPC identifier to restrict console access
        --vpc-source-ip=: Source IP address within VPC
