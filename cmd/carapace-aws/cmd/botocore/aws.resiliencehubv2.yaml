# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: resiliencehubv2
description: AWS Resilience Hub V2
commands:
    - name: create-assertion
      description: Creates a resilience assertion for a service.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --service-arn=!: ""
        --text=!: The text content of the assertion.
    - name: create-input-source
      description: Creates an input source for a service.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-configuration=!: ""
        --service-arn=!: ""
    - name: create-policy
      description: Creates a resilience policy that defines availability and disaster recovery requirements.
      flags:
        --availability-slo=: The availability SLO for the resilience policy.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --data-recovery=: The data recovery targets for the resilience policy.
        --description=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-id=: ""
        --multi-az=: The multi-AZ disaster recovery targets for the resilience policy.
        --multi-region=: The multi-Region disaster recovery targets for the resilience policy.
        --name=!: ""
        --tags=: ""
    - name: create-report
      description: On-demand report creation.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --report-type=!: The type of report to generate.
        --service-arn=!: ""
      completion:
        flag:
            report-type:
                - FAILURE_MODE
    - name: create-service
      description: Creates a service.
      flags:
        --associated-systems=:
            description: The systems to associate with the service.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --dependency-discovery=: ""
        --description=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-id=: ""
        --name=!: ""
        --permission-model=!: The permission model for the service.
        --policy-arn=: ""
        --regions=!:
            description: The AWS Regions where the service operates.
            nargs: -1
        --report-configuration=: ""
        --tags=: ""
      completion:
        flag:
            dependency-discovery:
                - ENABLED
                - DISABLED
    - name: create-service-function
      description: Creates a service function within a service.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --criticality=!: The criticality level of the service function.
        --description=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: ""
        --service-arn=!: ""
      completion:
        flag:
            criticality:
                - PRIMARY
                - SUPPLEMENTAL
    - name: create-service-function-resources
      description: Associates resources with a service function.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resources=!:
            description: The list of resources to associate with the service function.
            nargs: -1
        --service-arn=!: ""
        --service-function-id=!: The identifier of the service function to associate resources with.
    - name: create-system
      description: Creates a system that represents a logical grouping of services.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --description=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-id=: ""
        --name=!: ""
        --no-sharing-enabled: Indicates whether cross-account sharing is enabled for the system.
        --sharing-enabled: Indicates whether cross-account sharing is enabled for the system.
        --tags=: ""
    - name: create-user-journey
      description: Creates a user journey within a system.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
