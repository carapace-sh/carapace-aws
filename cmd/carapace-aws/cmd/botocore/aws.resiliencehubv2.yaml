        --policy-arn=: ""
        --skip-manually-added-resources: Whether to skip manually added resources during import.
        --tags=: ""
        --v1-app-arn=!: ""
    - name: import-policy
      description: Imports a V1 policy into V2, mapping RTO/RPO values from V1 scenarios.
      flags:
        --availability-slo=: The availability SLO to set on the imported policy.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-id=: ""
        --multi-az-disaster-recovery-approach=: The multi-AZ disaster recovery approach for the imported policy.
        --multi-region-disaster-recovery-approach=: The multi-Region disaster recovery approach for the imported policy.
        --tags=: ""
        --v1-policy-arn=!: ""
      completion:
        flag:
            multi-az-disaster-recovery-approach:
                - ACTIVE_ACTIVE
                - HOT_STANDBY
                - WARM_STANDBY
                - PILOT_LIGHT
                - BACKUP_AND_RESTORE
            multi-region-disaster-recovery-approach:
                - ACTIVE_ACTIVE
                - HOT_STANDBY
                - WARM_STANDBY
                - PILOT_LIGHT
                - BACKUP_AND_RESTORE
