    - name: import-app
      description: Imports a V1 app into the V2 resource model, creating a service with the same name.
      flags:
        --associated-systems=:
            description: The systems to associate with the imported service.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-id=: ""
