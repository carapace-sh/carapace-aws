                - EXCESSIVE_LOAD
                - EXCESSIVE_LATENCY
                - MISCONFIGURATION_AND_BUGS
                - SINGLE_POINT_OF_FAILURE
            severity:
                - LOW
                - MEDIUM
                - HIGH
            status:
