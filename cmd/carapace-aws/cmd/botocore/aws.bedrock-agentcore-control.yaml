# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: bedrock-agentcore-control
description: Amazon Bedrock AgentCore Control
commands:
    - name: add-dataset-examples
      description: Adds examples to the dataset's DRAFT.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --dataset-id=!: The unique identifier of the dataset to add examples to.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --source=!: Source of examples to add.
    - name: create-agent-runtime
      description: Creates an Amazon Bedrock AgentCore Runtime.
      flags:
        --agent-runtime-artifact=!: The artifact of the AgentCore Runtime.
        --agent-runtime-name=!: The name of the AgentCore Runtime.
        --authorizer-configuration=: The authorizer configuration for the AgentCore Runtime.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure idempotency of the request.
        --description=: The description of the AgentCore Runtime.
        --environment-variables=: Environment variables to set in the AgentCore Runtime environment.
        --filesystem-configurations=:
            description: The filesystem configurations to mount into the AgentCore Runtime.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --lifecycle-configuration=: The life cycle configuration for the AgentCore Runtime.
        --network-configuration=!: The network configuration for the AgentCore Runtime.
        --protocol-configuration=: ""
        --request-header-configuration=: Configuration for HTTP request headers that will be passed through to the runtime.
        --role-arn=!: The IAM role ARN that provides permissions for the AgentCore Runtime.
        --tags=: A map of tag keys and values to assign to the agent runtime.
    - name: create-agent-runtime-endpoint
      description: Creates an AgentCore Runtime endpoint.
      flags:
        --agent-runtime-id=!: The unique identifier of the AgentCore Runtime to create an endpoint for.
        --agent-runtime-version=: The version of the AgentCore Runtime to use for the endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure idempotency of the request.
        --description=: The description of the AgentCore Runtime endpoint.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the AgentCore Runtime endpoint.
        --tags=: A map of tag keys and values to assign to the agent runtime endpoint.
    - name: create-api-key-credential-provider
      description: Creates a new API key credential provider.
      flags:
        --api-key-secret-config=: A reference to the Amazon Web Services Secrets Manager secret that stores the API key.
        --api-key-secret-source=: The source type of the API key secret.
        --api-key=: The API key to use for authentication.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the API key credential provider.
        --tags=: A map of tag keys and values to assign to the API key credential provider.
      completion:
        flag:
            api-key-secret-source:
                - MANAGED
                - EXTERNAL
    - name: create-browser
      description: Creates a custom browser.
      flags:
        --browser-signing=: The browser signing configuration that enables cryptographic agent identification using HTTP message signatures for web bot authentication.
        --certificates=:
            description: A list of certificates to install in the browser.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the operation completes no more than one time.
        --description=: The description of the browser.
        --enterprise-policies=:
            description: A list of enterprise policy files for the browser.
            nargs: -1
        --execution-role-arn=: The Amazon Resource Name (ARN) of the IAM role that provides permissions for the browser to access Amazon Web Services services.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the browser.
        --network-configuration=!: The network configuration for the browser.
        --recording=: The recording configuration for the browser.
        --tags=: A map of tag keys and values to assign to the browser.
    - name: create-browser-profile
      description: Creates a browser profile in Amazon Bedrock AgentCore.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the operation completes no more than one time.
        --description=: A description of the browser profile.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the browser profile.
        --tags=: A map of tag keys and values to assign to the browser profile.
    - name: create-code-interpreter
      description: Creates a custom code interpreter.
      flags:
        --certificates=:
            description: A list of certificates to install in the code interpreter.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the operation completes no more than one time.
        --description=: The description of the code interpreter.
        --execution-role-arn=: The Amazon Resource Name (ARN) of the IAM role that provides permissions for the code interpreter to access Amazon Web Services services.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the code interpreter.
        --network-configuration=!: The network configuration for the code interpreter.
        --tags=: A map of tag keys and values to assign to the code interpreter.
    - name: create-configuration-bundle
      description: Creates a new configuration bundle resource.
      flags:
        --branch-name=: The branch name for version tracking.
        --bundle-name=!: The name for the configuration bundle.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --commit-message=: A commit message describing the initial version of the configuration bundle.
        --components=!: A map of component identifiers to their configurations.
        --created-by=: The source that created this version, including the source name and optional ARN.
        --description=: The description for the configuration bundle.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-arn=: Optional KMS key ARN for encrypting component configurations.
        --tags=: A map of tag keys and values to assign to the configuration bundle.
    - name: create-dataset
      description: Creates a new dataset resource asynchronously.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --dataset-name=!: Human-readable name for the dataset.
        --description=: A description of the dataset.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-arn=: Optional KMS key ARN for server-side encryption on service Amazon S3 writes.
        --schema-type=!: Versioned schema type governing the structure of examples.
        --source=!: Source of initial examples.
        --tags=: A map of tag keys and values to assign to the dataset.
      completion:
        flag:
            schema-type:
                - AGENTCORE_EVALUATION_PREDEFINED_V1
                - AGENTCORE_EVALUATION_SIMULATED_V1
    - name: create-dataset-version
      description: Publishes the current DRAFT as a new numbered version.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --dataset-id=!: The unique identifier of the dataset to publish a version for.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: create-evaluator
      description: Creates a custom evaluator for agent quality assessment.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --description=: The description of the evaluator that explains its purpose and evaluation criteria.
        --evaluator-config=!: The configuration for the evaluator.
        --evaluator-name=!: The name of the evaluator.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-key-arn=: The Amazon Resource Name (ARN) of a customer managed KMS key to use for encrypting sensitive evaluator data, including instructions and rating scale.
        --level=!: The evaluation level that determines the scope of evaluation.
        --tags=: A map of tag keys and values to assign to an AgentCore Evaluator.
      completion:
        flag:
            level:
                - TOOL_CALL
                - TRACE
                - SESSION
    - name: create-gateway
      description: Creates a gateway for Amazon Bedrock Agent.
      flags:
        --authorizer-configuration=: The authorizer configuration for the gateway.
        --authorizer-type=!: The type of authorizer to use for the gateway.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --description=: The description of the gateway.
        --exception-level=: The level of detail in error messages returned when invoking the gateway.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --interceptor-configurations=:
            description: A list of configuration settings for a gateway interceptor.
            nargs: -1
        --kms-key-arn=: The Amazon Resource Name (ARN) of the KMS key used to encrypt data associated with the gateway.
        --name=!: The name of the gateway.
        --policy-engine-configuration=: The policy engine configuration for the gateway.
        --protocol-configuration=: The configuration settings for the protocol specified in the `protocolType` parameter.
        --protocol-type=: The protocol type for the gateway.
        --role-arn=!: The Amazon Resource Name (ARN) of the IAM role that provides permissions for the gateway to access Amazon Web Services services.
        --tags=: A map of key-value pairs to associate with the gateway as metadata tags.
      completion:
        flag:
            authorizer-type:
                - CUSTOM_JWT
                - AWS_IAM
                - NONE
                - AUTHENTICATE_ONLY
            exception-level:
                - DEBUG
            protocol-type:
                - MCP
    - name: create-gateway-rule
      description: Creates a rule for a gateway.
      flags:
        --actions=!:
            description: The actions to take when the rule conditions are met.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --conditions=:
            description: The conditions that must be met for the rule to apply.
            nargs: -1
        --description=: The description of the gateway rule.
        --gateway-identifier=!: The identifier of the gateway to create a rule for.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --priority=!: The priority of the rule.
    - name: create-gateway-target
      description: Creates a target for a gateway.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --credential-provider-configurations=:
            description: The credential provider configurations for the target.
            nargs: -1
        --description=: The description of the gateway target.
        --gateway-identifier=!: The identifier of the gateway to create a target for.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --metadata-configuration=: Optional configuration for HTTP header and query parameter propagation to and from the gateway target.
        --name=: The name of the gateway target.
        --private-endpoint=: The private endpoint configuration for the gateway target.
        --target-configuration=!: The configuration settings for the target, including endpoint information and schema definitions.
    - name: create-harness
      description: Operation to create a harness.
      flags:
        --allowed-tools=:
            description: The tools that the agent is allowed to use.
            nargs: -1
        --authorizer-configuration=: ""
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure idempotency of the request.
        --environment-artifact=: The environment artifact for the harness, such as a custom container image containing additional dependencies.
        --environment-variables=: Environment variables to set in the harness runtime environment.
        --environment=: The compute environment configuration for the harness, including network and lifecycle settings.
        --execution-role-arn=!: The ARN of the IAM role that the harness assumes when running.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --harness-name=!: The name of the harness.
        --max-iterations=: The maximum number of iterations the agent loop can execute per invocation.
        --max-tokens=: The maximum total number of output tokens the agent can generate across all model calls within a single invocation.
        --memory=: The AgentCore Memory configuration for persisting conversation context across sessions.
        --model=: The model configuration for the harness.
        --skills=:
            description: The skills available to the agent.
            nargs: -1
        --system-prompt=:
            description: The system prompt that defines the agent's behavior and instructions.
            nargs: -1
        --tags=: Tags to apply to the harness resource.
        --timeout-seconds=: The maximum duration in seconds for the agent loop execution per invocation.
        --tools=:
            description: The tools available to the agent, such as remote MCP servers, AgentCore Gateway, AgentCore Browser, Code Interpreter, or inline functions.
            nargs: -1
        --truncation=: The truncation configuration for managing conversation context when it exceeds model limits.
    - name: create-harness-endpoint
      description: Operation to create a harness endpoint.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure idempotency of the request.
        --description=: A description of the endpoint.
        --endpoint-name=!: The name of the endpoint.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --harness-id=!: The ID of the harness to create an endpoint for.
        --tags=: Tags to apply to the endpoint resource.
        --target-version=: The harness version that the endpoint points to and serves invocations from.
    - name: create-memory
      description: Creates a new Amazon Bedrock AgentCore Memory resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the operation completes no more than one time.
        --description=: The description of the memory.
        --encryption-key-arn=: The Amazon Resource Name (ARN) of the KMS key used to encrypt the memory data.
        --event-expiry-duration=!: The duration after which memory events expire.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --indexed-keys=:
            description: Metadata keys to index for filtering.
            nargs: -1
        --memory-execution-role-arn=: The Amazon Resource Name (ARN) of the IAM role that provides permissions for the memory to access Amazon Web Services services.
        --memory-strategies=:
            description: The memory strategies to use for this memory.
            nargs: -1
        --name=!: The name of the memory.
        --stream-delivery-resources=: Configuration for streaming memory record data to external resources.
        --tags=: A map of tag keys and values to assign to an AgentCore Memory.
    - name: create-oauth2-credential-provider
      description: Creates a new OAuth2 credential provider.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --credential-provider-vendor=!: The vendor of the OAuth2 credential provider.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the OAuth2 credential provider.
        --oauth2-provider-config-input=!: The configuration settings for the OAuth2 provider, including client ID, client secret, and other vendor-specific settings.
        --tags=: A map of tag keys and values to assign to the OAuth2 credential provider.
      completion:
        flag:
            credential-provider-vendor:
                - GoogleOauth2
                - GithubOauth2
                - SlackOauth2
                - SalesforceOauth2
                - MicrosoftOauth2
                - CustomOauth2
                - AtlassianOauth2
                - LinkedinOauth2
                - XOauth2
                - OktaOauth2
                - OneLoginOauth2
                - PingOneOauth2
                - FacebookOauth2
                - YandexOauth2
                - RedditOauth2
                - ZoomOauth2
                - TwitchOauth2
                - SpotifyOauth2
                - DropboxOauth2
                - NotionOauth2
                - HubspotOauth2
                - CyberArkOauth2
                - FusionAuthOauth2
                - Auth0Oauth2
                - CognitoOauth2
    - name: create-online-evaluation-config
      description: Creates an online evaluation configuration for continuous monitoring of agent performance.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --clustering-config=: Configuration for periodic batch evaluation clustering of insight results.
        --data-source-config=!: The data source configuration that specifies CloudWatch log groups and service names to monitor for agent traces.
        --description=: The description of the online evaluation configuration that explains its monitoring purpose and scope.
        --enable-on-create!: Whether to enable the online evaluation configuration immediately upon creation.
        --evaluation-execution-role-arn=!: The Amazon Resource Name (ARN) of the IAM role that grants permissions to read from CloudWatch logs, write evaluation results, and invoke Amazon Bedrock models for evaluation.
        --evaluators=:
            description: The list of evaluators to apply during online evaluation.
            nargs: -1
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --insights=:
            description: The list of insight types to run against agent sessions.
            nargs: -1
        --no-enable-on-create!: Whether to enable the online evaluation configuration immediately upon creation.
        --online-evaluation-config-name=!: The name of the online evaluation configuration.
        --rule=!: The evaluation rule that defines sampling configuration, filters, and session detection settings for the online evaluation.
        --tags=: A map of tag keys and values to assign to an AgentCore Online Evaluation Config.
    - name: create-payment-connector
      description: Creates a new payment connector for a payment manager.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --credential-provider-configurations=!:
            description: The credential provider configurations for the payment connector.
            nargs: -1
        --description=: A description of the payment connector.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the payment connector.
        --payment-manager-id=!: The unique identifier of the payment manager to create the connector for.
        --type=!: The type of payment connector, which determines the payment provider integration.
      completion:
        flag:
            type:
                - CoinbaseCDP
                - StripePrivy
    - name: create-payment-credential-provider
      description: Creates a new payment credential provider for storing authentication credentials used by payment connectors to communicate with external payment providers.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --credential-provider-vendor=!: The vendor type for the payment credential provider (e.g., CoinbaseCDP, StripePrivy).
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: Unique name for the payment credential provider.
        --provider-configuration-input=!: Configuration specific to the vendor, including API credentials.
        --tags=: Optional tags for resource organization.
      completion:
        flag:
            credential-provider-vendor:
                - CoinbaseCDP
                - StripePrivy
    - name: create-payment-manager
      description: Creates a new payment manager in your Amazon Web Services account.
      flags:
        --authorizer-configuration=: The authorizer configuration for the payment manager.
        --authorizer-type=!: The type of authorizer to use for the payment manager.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --description=: A description of the payment manager.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the payment manager.
        --role-arn=!: The Amazon Resource Name (ARN) of the IAM role that the payment manager assumes to access resources on your behalf.
        --tags=: A map of tag keys and values to assign to the payment manager.
      completion:
        flag:
            authorizer-type:
                - CUSTOM_JWT
                - AWS_IAM
    - name: create-policy
      description: Creates a policy within the AgentCore Policy system.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure the idempotency of the request.
        --definition=!: The Cedar policy statement that defines the access control rules.
        --description=: A human-readable description of the policy's purpose and functionality (1-4,096 characters).
        --enforcement-mode=: The enforcement mode for the policy.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The customer-assigned immutable name for the policy.
        --policy-engine-id=!: The identifier of the policy engine which contains this policy.
        --validation-mode=: The validation mode for the policy creation.
      completion:
        flag:
            enforcement-mode:
                - ACTIVE
                - LOG_ONLY
            validation-mode:
                - FAIL_ON_ANY_FINDINGS
                - IGNORE_ALL_FINDINGS
    - name: create-policy-engine
      description: Creates a new policy engine within the AgentCore Policy system.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --description=: A human-readable description of the policy engine's purpose and scope (1-4,096 characters).
        --encryption-key-arn=: The Amazon Resource Name (ARN) of the KMS key used to encrypt the policy engine data.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The customer-assigned immutable name for the policy engine.
        --tags=: A map of tag keys and values to assign to an AgentCore Policy.
    - name: create-registry
      description: Creates a new registry in your Amazon Web Services account.
      flags:
        --approval-configuration=: The approval configuration for registry records.
        --authorizer-configuration=: The authorizer configuration for the registry.
        --authorizer-type=: The type of authorizer to use for the registry.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --description=: A description of the registry.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the registry.
      completion:
        flag:
            authorizer-type:
                - CUSTOM_JWT
                - AWS_IAM
    - name: create-registry-record
      description: Creates a new registry record within the specified registry.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --description=: A description of the registry record.
        --descriptor-type=!: The descriptor type of the registry record.
        --descriptors=: The descriptor-type-specific configuration containing the resource schema and metadata.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the registry record.
        --record-version=: The version of the registry record.
        --registry-id=!: The identifier of the registry where the record will be created.
        --synchronization-configuration=: The configuration for synchronizing registry record metadata from an external source, such as a URL-based MCP server.
        --synchronization-type=: The type of synchronization to use for keeping the record metadata up to date from an external source.
      completion:
        flag:
            descriptor-type:
                - MCP
                - A2A
                - CUSTOM
                - AGENT_SKILLS
            synchronization-type:
                - URL
    - name: create-workload-identity
      description: Creates a new workload identity.
      flags:
        --allowed-resource-oauth2-return-urls=:
            description: The list of allowed OAuth2 return URLs for resources associated with this workload identity.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the workload identity.
        --tags=: A map of tag keys and values to assign to the workload identity.
    - name: delete-agent-runtime
      description: Deletes an Amazon Bedrock AgentCore Runtime.
      flags:
        --agent-runtime-id=!: The unique identifier of the AgentCore Runtime to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the operation completes no more than one time.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-agent-runtime-endpoint
      description: Deletes an AAgentCore Runtime endpoint.
      flags:
        --agent-runtime-id=!: The unique identifier of the AgentCore Runtime associated with the endpoint.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
