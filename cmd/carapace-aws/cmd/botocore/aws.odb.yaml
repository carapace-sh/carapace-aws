        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-cloud-autonomous-vm-cluster
      description: Deletes an Autonomous VM cluster.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --cloud-autonomous-vm-cluster-id=!: The unique identifier of the Autonomous VM cluster to delete.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-cloud-exadata-infrastructure
      description: Deletes the specified Exadata infrastructure.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --cloud-exadata-infrastructure-id=!: The unique identifier of the Exadata infrastructure to delete.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-cloud-vm-cluster
      description: Deletes the specified VM cluster.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --cloud-vm-cluster-id=!: The unique identifier of the VM cluster to delete.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-odb-network
      description: Deletes the specified ODB network.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --delete-associated-resources!: Specifies whether to delete associated OCI networking resources along with the ODB network.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --no-delete-associated-resources!: Specifies whether to delete associated OCI networking resources along with the ODB network.
        --odb-network-id=!: The unique identifier of the ODB network to delete.
    - name: delete-odb-peering-connection
      description: Deletes an ODB peering connection.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --odb-peering-connection-id=!: The unique identifier of the ODB peering connection to delete.
    - name: disassociate-iam-role-from-resource
      description: Disassociates an Amazon Web Services Identity and Access Management (IAM) service role from a specified resource to disable Amazon Web Services service integration.
      flags:
        --aws-integration=!: The Amazon Web Services integration configuration settings for the Amazon Web Services Identity and Access Management (IAM) service role disassociation.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --iam-role-arn=!: The Amazon Resource Name (ARN) of the Amazon Web Services Identity and Access Management (IAM) service role to disassociate from the resource.
        --resource-arn=!: The Amazon Resource Name (ARN) of the target resource to disassociate from the Amazon Web Services Identity and Access Management (IAM) service role.
      completion:
        flag:
            aws-integration:
                - KmsTde
    - name: failover-autonomous-database
      description: Initiates a failover of the specified Autonomous Database to a standby peer database.
      flags:
        --autonomous-database-id=!: The unique identifier of the Autonomous Database to fail over.
