# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: odb
description: odb
commands:
    - name: accept-marketplace-registration
      description: Registers the Amazon Web Services Marketplace token for your Amazon Web Services account to activate your Oracle Database@Amazon Web Services subscription.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --marketplace-registration-token=!: The registration token that's generated by Amazon Web Services Marketplace and sent to Oracle Database@Amazon Web Services.
    - name: associate-iam-role-to-resource
      description: Associates an Amazon Web Services Identity and Access Management (IAM) service role with a specified resource to enable Amazon Web Services service integration.
      flags:
        --aws-integration=!: The Amazon Web Services integration configuration settings for the Amazon Web Services Identity and Access Management (IAM) service role association.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --iam-role-arn=!: The Amazon Resource Name (ARN) of the Amazon Web Services Identity and Access Management (IAM) service role to associate with the resource.
        --resource-arn=!: The Amazon Resource Name (ARN) of the target resource to associate with the Amazon Web Services Identity and Access Management (IAM) service role.
      completion:
        flag:
            aws-integration:
                - KmsTde
    - name: create-autonomous-database
      description: Creates a new Autonomous Database.
      flags:
        --admin-password=: The password for the `ADMIN` user of the Autonomous Database.
        --allowlisted-ips=:
            description: The list of IP addresses that are allowed to access the Autonomous Database.
            nargs: -1
        --autonomous-maintenance-schedule-type=: The maintenance schedule type for the Autonomous Database.
        --backup-retention-period-in-days=: The retention period, in days, for automatic backups of the Autonomous Database.
        --byol-compute-count-limit=: The maximum number of compute resources that you can allocate to the Autonomous Database under the bring-your-own-license (BYOL) model.
        --character-set=: The character set to use for the Autonomous Database.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A client-provided token to ensure the idempotency of the request.
        --compute-count=: The compute capacity, in number of Elastic CPUs (ECPUs) or Oracle CPUs (OCPUs), to assign to the Autonomous Database.
        --cpu-core-count=: The number of CPU cores to allocate to the Autonomous Database.
        --customer-contacts-to-send-to-oci=:
            description: The list of customer contacts to receive operational notifications from Oracle Cloud Infrastructure (OCI) for the Autonomous Database.
            nargs: -1
        --data-storage-size-in-g-bs=: The size, in gigabytes (GB), of the data volume to allocate for the Autonomous Database.
        --data-storage-size-in-tbs=: The size, in terabytes (TB), of the data volume to allocate for the Autonomous Database.
        --database-edition=: The Oracle Database edition to apply to the Autonomous Database.
        --db-name=: The name of the Autonomous Database.
        --db-tools-details=:
            description: The list of database management tools to enable for the Autonomous Database.
            nargs: -1
        --db-version=: The Oracle Database software version to use for the Autonomous Database.
        --db-workload=: The intended use of the Autonomous Database, such as transaction processing, data warehouse, JSON database, or APEX.
        --display-name=: The user-friendly name for the Autonomous Database.
        --encryption-key-configuration=: The configuration of the encryption key to use for the Autonomous Database.
        --encryption-key-provider=: The provider of the encryption key to use for the Autonomous Database.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --is-auto-scaling-enabled: Specifies whether to enable automatic scaling of the compute resources for the Autonomous Database.
        --is-auto-scaling-for-storage-enabled: Specifies whether to enable automatic scaling of the storage for the Autonomous Database.
        --is-backup-retention-locked: Specifies whether to lock the backup retention period of the Autonomous Database to prevent it from being shortened.
        --is-local-data-guard-enabled: Specifies whether to enable local Oracle Data Guard for the Autonomous Database.
        --is-mtls-connection-required: Specifies whether mutual TLS (mTLS) authentication is required to connect to the Autonomous Database.
        --license-model=: The Oracle license model to apply to the Autonomous Database.
        --ncharacter-set=: The national character set to use for the Autonomous Database.
        --no-is-auto-scaling-enabled: Specifies whether to enable automatic scaling of the compute resources for the Autonomous Database.
        --no-is-auto-scaling-for-storage-enabled: Specifies whether to enable automatic scaling of the storage for the Autonomous Database.
        --no-is-backup-retention-locked: Specifies whether to lock the backup retention period of the Autonomous Database to prevent it from being shortened.
        --no-is-local-data-guard-enabled: Specifies whether to enable local Oracle Data Guard for the Autonomous Database.
        --no-is-mtls-connection-required: Specifies whether mutual TLS (mTLS) authentication is required to connect to the Autonomous Database.
        --odb-network-id=: The unique identifier of the ODB network to be used for the Autonomous Database.
        --private-endpoint-ip=: The private endpoint IP address for the Autonomous Database.
        --private-endpoint-label=: The private endpoint label for the Autonomous Database.
        --resource-pool-leader-id=: The unique identifier of the resource pool leader Autonomous Database.
        --resource-pool-summary=: The configuration of the resource pool for the Autonomous Database.
        --scheduled-operations=:
            description: The list of scheduled start and stop times for the Autonomous Database.
            nargs: -1
        --source-configuration=: The configuration details for the source used to create the Autonomous Database.
        --source=: The source from which to create the Autonomous Database, such as a clone, backup, or cross-Region copy.
        --standby-allowlisted-ips-source=: The source of the allowlisted IP addresses for the standby Autonomous Database.
        --standby-allowlisted-ips=:
            description: The list of IP addresses that are allowed to access the standby Autonomous Database.
            nargs: -1
        --tags=: The list of resource tags to apply to the Autonomous Database.
        --transportable-tablespace=: The transportable tablespace configuration to use when creating the Autonomous Database.
      completion:
        flag:
            autonomous-maintenance-schedule-type:
                - EARLY
                - REGULAR
            database-edition:
                - STANDARD_EDITION
                - ENTERPRISE_EDITION
            db-workload:
                - OLTP
                - AJD
                - APEX
                - LH
            encryption-key-provider:
                - ORACLE_MANAGED
                - AWS_KMS
            license-model:
                - BRING_YOUR_OWN_LICENSE
                - LICENSE_INCLUDED
            source:
                - NONE
                - DATABASE
                - BACKUP_FROM_ID
                - BACKUP_FROM_TIMESTAMP
                - CROSS_REGION_DATAGUARD
                - CROSS_REGION_DISASTER_RECOVERY
                - CLONE_TO_REFRESHABLE
            standby-allowlisted-ips-source:
                - PRIMARY
                - SEPARATE
                - NOT_APPLICABLE
    - name: create-autonomous-database-backup
      description: Creates a new backup of the specified Autonomous Database.
      flags:
        --autonomous-database-id=!: The unique identifier of the Autonomous Database to back up.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A client-provided token to ensure the idempotency of the request.
        --display-name=: The user-friendly name for the Autonomous Database backup.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --retention-period-in-days=: The retention period, in days, for the Autonomous Database backup.
        --tags=: The list of resource tags to apply to the Autonomous Database backup.
    - name: create-autonomous-database-wallet
      description: Creates a new wallet for the specified Autonomous Database.
      flags:
        --autonomous-database-id=!: The unique identifier of the Autonomous Database to create a wallet for.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A client-provided token to ensure the idempotency of the request.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --password=!: The password to encrypt the keys inside the wallet.
        --wallet-type=: The type of wallet to create, either a regional wallet or an instance wallet.
      completion:
        flag:
            wallet-type:
                - REGIONAL
                - INSTANCE
    - name: create-cloud-autonomous-vm-cluster
      description: Creates a new Autonomous VM cluster in the specified Exadata infrastructure.
      flags:
        --autonomous-data-storage-size-in-tbs=!: The data disk group size to be allocated for Autonomous Databases, in terabytes (TB).
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A client-provided token to ensure idempotency of the request.
        --cloud-exadata-infrastructure-id=!: The unique identifier of the Exadata infrastructure where the VM cluster will be created.
        --cpu-core-count-per-node=!: The number of CPU cores to be enabled per VM cluster node.
        --db-servers=:
            description: The list of database servers to be used for the Autonomous VM cluster.
            nargs: -1
        --description=: A user-provided description of the Autonomous VM cluster.
        --display-name=!: The display name for the Autonomous VM cluster.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --is-mtls-enabled-vm-cluster: Specifies whether to enable mutual TLS (mTLS) authentication for the Autonomous VM cluster.
        --license-model=: The Oracle license model to apply to the Autonomous VM cluster.
        --maintenance-window=: The scheduling details for the maintenance window.
        --memory-per-oracle-compute-unit-in-gbs=!: The amount of memory to be allocated per OCPU, in GB.
        --no-is-mtls-enabled-vm-cluster: Specifies whether to enable mutual TLS (mTLS) authentication for the Autonomous VM cluster.
        --odb-network-id=!: The unique identifier of the ODB network to be used for the VM cluster.
        --scan-listener-port-non-tls=: The SCAN listener port for non-TLS (TCP) protocol.
        --scan-listener-port-tls=: The SCAN listener port for TLS (TCP) protocol.
        --tags=: Free-form tags for this resource.
        --time-zone=: The time zone to use for the Autonomous VM cluster.
        --total-container-databases=!: The total number of Autonomous CDBs that you can create in the Autonomous VM cluster.
      completion:
        flag:
            license-model:
                - BRING_YOUR_OWN_LICENSE
                - LICENSE_INCLUDED
    - name: create-cloud-exadata-infrastructure
      description: Creates an Exadata infrastructure.
      flags:
        --availability-zone-id=: The AZ ID of the AZ where the Exadata infrastructure is located.
        --availability-zone=: The name of the Availability Zone (AZ) where the Exadata infrastructure is located.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --compute-count=!: The number of database servers for the Exadata infrastructure.
        --customer-contacts-to-send-to-oci=:
            description: The email addresses of contacts to receive notification from Oracle about maintenance updates for the Exadata infrastructure.
            nargs: -1
        --database-server-type=: The database server model type of the Exadata infrastructure.
        --display-name=!: A user-friendly name for the Exadata infrastructure.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --maintenance-window=: The maintenance window configuration for the Exadata Cloud infrastructure.
        --shape=!: The model name of the Exadata infrastructure.
        --storage-count=!: The number of storage servers to activate for this Exadata infrastructure.
        --storage-server-type=: The storage server model type of the Exadata infrastructure.
        --tags=: The list of resource tags to apply to the Exadata infrastructure.
    - name: create-cloud-vm-cluster
      description: Creates a VM cluster on the specified Exadata infrastructure.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --cloud-exadata-infrastructure-id=!: The unique identifier of the Exadata infrastructure for this VM cluster.
        --cluster-name=: A name for the Grid Infrastructure cluster.
        --cpu-core-count=!: The number of CPU cores to enable on the VM cluster.
        --data-collection-options=: The set of preferences for the various diagnostic collection options for the VM cluster.
        --data-storage-size-in-tbs=: The size of the data disk group, in terabytes (TBs), to allocate for the VM cluster.
        --db-node-storage-size-in-gbs=: The amount of local node storage, in gigabytes (GBs), to allocate for the VM cluster.
        --db-servers=:
            description: The list of database servers for the VM cluster.
            nargs: -1
        --display-name=!: A user-friendly name for the VM cluster.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --gi-version=!: A valid software version of Oracle Grid Infrastructure (GI).
        --hostname=!: The host name for the VM cluster.
        --is-local-backup-enabled: Specifies whether to enable database backups to local Exadata storage for the VM cluster.
        --is-sparse-diskgroup-enabled: Specifies whether to create a sparse disk group for the VM cluster.
        --license-model=: The Oracle license model to apply to the VM cluster.
        --memory-size-in-gbs=: The amount of memory, in gigabytes (GBs), to allocate for the VM cluster.
        --no-is-local-backup-enabled: Specifies whether to enable database backups to local Exadata storage for the VM cluster.
        --no-is-sparse-diskgroup-enabled: Specifies whether to create a sparse disk group for the VM cluster.
        --odb-network-id=!: The unique identifier of the ODB network for the VM cluster.
        --scan-listener-port-tcp=: The port number for TCP connections to the single client access name (SCAN) listener.
        --ssh-public-keys=!:
            description: The public key portion of one or more key pairs used for SSH access to the VM cluster.
            nargs: -1
        --system-version=: The version of the operating system of the image for the VM cluster.
        --tags=: The list of resource tags to apply to the VM cluster.
        --time-zone=: The time zone for the VM cluster.
      completion:
        flag:
            license-model:
                - BRING_YOUR_OWN_LICENSE
                - LICENSE_INCLUDED
    - name: create-odb-network
      description: Creates an ODB network.
      flags:
        --availability-zone-id=: The AZ ID of the AZ where the ODB network is located.
        --availability-zone=: The Amazon Web Services Availability Zone (AZ) where the ODB network is located.
        --backup-subnet-cidr=: The CIDR range of the backup subnet for the ODB network.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-subnet-cidr=!: The CIDR range of the client subnet for the ODB network.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --cross-region-s3-restore-sources-to-enable=:
            description: The cross-Region Amazon S3 restore sources to enable for the ODB network.
            nargs: -1
        --custom-domain-name=: The domain name to use for the resources in the ODB network.
        --default-dns-prefix=: The DNS prefix to the default DNS domain name.
        --display-name=!: A user-friendly name for the ODB network.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --kms-access=: The Amazon Web Services Key Management Service (KMS) access configuration for the ODB network.
        --kms-policy-document=: The Amazon Web Services Key Management Service (KMS) policy document that defines permissions for key usage within the ODB network.
        --s3-access=: Specifies the configuration for Amazon S3 access from the ODB network.
        --s3-policy-document=: Specifies the endpoint policy for Amazon S3 access from the ODB network.
        --sts-access=: The Amazon Web Services Security Token Service (STS) access configuration for the ODB network.
        --sts-policy-document=: The Amazon Web Services Security Token Service (STS) policy document that defines permissions for token service usage within the ODB network.
        --tags=: The list of resource tags to apply to the ODB network.
        --zero-etl-access=: Specifies the configuration for Zero-ETL access from the ODB network.
      completion:
        flag:
            kms-access:
                - ENABLED
                - DISABLED
            s3-access:
                - ENABLED
                - DISABLED
            sts-access:
                - ENABLED
                - DISABLED
            zero-etl-access:
                - ENABLED
                - DISABLED
    - name: create-odb-peering-connection
      description: Creates a peering connection between an ODB network and a VPC.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: The client token for the ODB peering connection request.
        --display-name=: The display name for the ODB peering connection.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --odb-network-id=!: The unique identifier of the ODB network that initiates the peering connection.
        --peer-network-cidrs-to-be-added=:
            description: A list of CIDR blocks to add to the peering connection.
            nargs: -1
        --peer-network-id=!: The unique identifier of the peer network.
        --peer-network-route-table-ids=:
            description: The unique identifier of the VPC route table for which a route to the ODB network is automatically created during peering connection establishment.
            nargs: -1
        --tags=: The tags to assign to the ODB peering connection.
    - name: delete-autonomous-database
      description: Deletes the specified Autonomous Database.
      flags:
        --autonomous-database-id=!: The unique identifier of the Autonomous Database to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-autonomous-database-backup
      description: Deletes the specified Autonomous Database backup.
