    - name: get-oci-onboarding-status
      description: Returns the tenancy activation link and onboarding status for your Amazon Web Services account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-odb-network
      description: Returns information about the specified ODB network.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --odb-network-id=!: The unique identifier of the ODB network.
    - name: get-odb-peering-connection
      description: Retrieves information about an ODB peering connection.
