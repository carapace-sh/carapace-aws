# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: simpledbv2
description: Amazon SimpleDB v2
commands:
    - name: get-export
      description: Returns information for an existing domain export.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --export-arn=!: Unique ARN identifier of the export.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: list-exports
      description: Lists all exports that were created.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --domain-name=: The name of the domain to filter exports.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of exports to return in a single response.
        --next-token=: A pagination token used to retrieve the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: start-domain-export
      description: Initiates the export of a SimpleDB domain to an S3 bucket.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: Providing a ClientToken makes the call to StartDomainExport API idempotent, meaning that multiple identical calls have the same effect as one single call.
        --domain-name=!: The name of the domain to export.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --s3-bucket-owner=: The ID of the AWS account that owns the bucket the export will be stored in.
        --s3-bucket=!: The name of the S3 bucket where the domain data will be exported.
        --s3-key-prefix=: The prefix string to be used to generate the S3 object keys for export artifacts.
        --s3-sse-algorithm=: The server-side encryption algorithm to use for the exported data in S3.
        --s3-sse-kms-key-id=: The KMS key ID to use for server-side encryption with AWS KMS-managed keys (SSE-KMS).
      completion:
        flag:
            s3-sse-algorithm:
                - AES256
                - KMS
    - name: wait
      description: Wait  until  a particular condition is satisfied.
      commands:
        - name: export-succeeded
          description: Returns information for an existing domain export.
          flags:
            --cli-input-json=: Read arguments from the JSON string provided.
            --cli-input-yaml=: Read arguments from the YAML string provided.
            --export-arn=!: Unique ARN identifier of the export.
            --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
