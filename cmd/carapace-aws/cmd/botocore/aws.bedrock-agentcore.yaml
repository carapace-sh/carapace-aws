# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: bedrock-agentcore
description: Amazon Bedrock AgentCore
commands:
    - name: batch-create-memory-records
      description: Creates multiple memory records in a single batch operation for the specified memory with custom content.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure idempotent processing of the batch request.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --memory-id=!: The unique ID of the memory resource where records will be created.
        --records=!:
            description: A list of memory record creation inputs to be processed in the batch operation.
            nargs: -1
    - name: batch-delete-memory-records
      description: Deletes multiple memory records in a single batch operation from the specified memory.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --memory-id=!: The unique ID of the memory resource where records will be deleted.
        --records=!:
            description: A list of memory record deletion inputs to be processed in the batch operation.
            nargs: -1
    - name: batch-update-memory-records
      description: Updates multiple memory records with custom content in a single batch operation within the specified memory.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --memory-id=!: The unique ID of the memory resource where records will be updated.
        --records=!:
            description: A list of memory record update inputs to be processed in the batch operation.
            nargs: -1
    - name: complete-resource-token-auth
      description: Confirms the user authentication session for obtaining OAuth2.0 tokens for a resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --session-uri=!: Unique identifier for the user's authentication session for retrieving OAuth2 tokens.
        --user-identifier=!: The OAuth2.0 token or user ID that was used to generate the workload access token used for initiating the user authorization flow to retrieve OAuth2.0 tokens.
    - name: create-ab-test
      description: Creates an A/B test for comparing agent configurations.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the API request completes no more than one time.
        --description=: The description of the A/B test.
        --enable-on-create: Whether to enable the A/B test immediately upon creation.
        --evaluation-config=!: The evaluation configuration specifying which online evaluation configurations to use for measuring variant performance.
        --gateway-arn=!: The Amazon Resource Name (ARN) of the gateway to use for traffic splitting.
        --gateway-filter=: Optional filter to restrict which gateway target paths are included in the A/B test.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: The name of the A/B test.
        --no-enable-on-create: Whether to enable the A/B test immediately upon creation.
        --role-arn=!: The IAM role ARN that grants permissions for the A/B test to access gateway and evaluation resources.
        --tags=: A map of tag keys and values to associate with the A/B test.
        --variants=!:
            description: The list of variants for the A/B test.
            nargs: -1
    - name: create-event
      description: Creates an event in an AgentCore Memory resource.
      flags:
        --actor-id=!: The identifier of the actor associated with this event.
        --branch=: The branch information for this event.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the operation completes no more than one time.
        --event-timestamp=!: The timestamp when the event occurred.
        --extraction-mode=: Controls long-term memory extraction for this event.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --memory-id=!: The identifier of the AgentCore Memory resource in which to create the event.
        --metadata=: The key-value metadata to attach to the event.
        --payload=!:
            description: The content payload of the event.
            nargs: -1
        --session-id=: The identifier of the session in which this event occurs.
      completion:
        flag:
            extraction-mode:
                - SKIP
    - name: create-payment-instrument
      description: Create a new payment instrument for a connector.
      flags:
        --agent-name=: The agent name associated with this request, used for observability.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --payment-connector-id=!: The ID of the payment connector to use for this instrument.
        --payment-instrument-details=!: The details of the payment instrument.
        --payment-instrument-type=!: The type of payment instrument being created.
        --payment-manager-arn=!: The ARN of the payment manager that owns this payment instrument.
        --user-id=: The user ID associated with this payment instrument.
      completion:
        flag:
            payment-instrument-type:
                - EMBEDDED_CRYPTO_WALLET
    - name: create-payment-session
      description: Create a new payment session.
      flags:
        --agent-name=: The agent name associated with this request, used for observability.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --expiry-time-in-minutes=!: The session expiry time in minutes.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --limits=: The spending limits for this payment session.
        --payment-manager-arn=!: The ARN of the payment manager that owns this session.
        --user-id=: The user ID associated with this payment session.
    - name: delete-ab-test
      description: Deletes an A/B test and its associated gateway rules.
      flags:
        --ab-test-id=!: The unique identifier of the A/B test to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-batch-evaluation
      description: Deletes a batch evaluation and its associated results.
      flags:
        --batch-evaluation-id=!: The unique identifier of the batch evaluation to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: delete-event
      description: Deletes an event from an AgentCore Memory resource.
      flags:
        --actor-id=!: The identifier of the actor associated with the event to delete.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --event-id=!: The identifier of the event to delete.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --memory-id=!: The identifier of the AgentCore Memory resource from which to delete the event.
        --session-id=!: The identifier of the session containing the event to delete.
    - name: delete-memory-record
      description: Deletes a memory record from an AgentCore Memory resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --memory-id=!: The identifier of the AgentCore Memory resource from which to delete the memory record.
        --memory-record-id=!: The identifier of the memory record to delete.
    - name: delete-payment-instrument
      description: Deletes a payment instrument.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --payment-connector-id=!: The payment connector ID.
        --payment-instrument-id=!: The payment instrument ID to delete.
        --payment-manager-arn=!: The payment manager ARN.
        --user-id=: The user ID making the delete request.
    - name: delete-payment-session
      description: Deletes a payment session.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --payment-manager-arn=!: The payment manager ARN.
        --payment-session-id=!: The payment session ID to delete.
        --user-id=: The user ID making the delete request.
    - name: delete-recommendation
      description: Deletes a recommendation and its associated results.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --recommendation-id=!: The unique identifier of the recommendation to delete.
    - name: evaluate
      description: Performs on-demand evaluation of agent traces using a specified evaluator.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --evaluation-input=!: The input data containing agent session spans to be evaluated.
        --evaluation-reference-inputs=:
            description: Ground truth data to compare against agent responses during evaluation.
            nargs: -1
        --evaluation-target=: The specific trace or span IDs to evaluate within the provided input.
        --evaluator-id=!: The unique identifier of the evaluator to use for scoring.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-ab-test
      description: Retrieves detailed information about an A/B test, including its configuration, status, and statistical results.
      flags:
        --ab-test-id=!: The unique identifier of the A/B test to retrieve.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-agent-card
      description: Retrieves the A2A agent card associated with an AgentCore Runtime agent.
      flags:
        --agent-runtime-arn=!: The ARN of the AgentCore Runtime agent for which you want to get the A2A agent card.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --qualifier=: Optional qualifier to specify an agent alias, such as `prod`code&gt; or `dev`.
        --runtime-session-id=: The session ID that the AgentCore Runtime agent is using.
    - name: get-batch-evaluation
      description: Retrieves detailed information about a batch evaluation, including its status, configuration, results, and any error details.
      flags:
        --batch-evaluation-id=!: The unique identifier of the batch evaluation to retrieve.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-browser-session
      description: Retrieves detailed information about a specific browser session in Amazon Bedrock AgentCore.
      flags:
        --browser-identifier=!: The unique identifier of the browser associated with the session.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --session-id=!: The unique identifier of the browser session to retrieve.
    - name: get-code-interpreter-session
      description: Retrieves detailed information about a specific code interpreter session in Amazon Bedrock AgentCore.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --code-interpreter-identifier=!: The unique identifier of the code interpreter associated with the session.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --session-id=!: The unique identifier of the code interpreter session to retrieve.
    - name: get-event
      description: Retrieves information about a specific event in an AgentCore Memory resource.
      flags:
        --actor-id=!: The identifier of the actor associated with the event.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --event-id=!: The identifier of the event to retrieve.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --memory-id=!: The identifier of the AgentCore Memory resource containing the event.
        --session-id=!: The identifier of the session containing the event.
    - name: get-memory-record
      description: Retrieves a specific memory record from an AgentCore Memory resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --memory-id=!: The identifier of the AgentCore Memory resource containing the memory record.
        --memory-record-id=!: The identifier of the memory record to retrieve.
    - name: get-payment-instrument
      description: Get a payment instrument by ID.
      flags:
        --agent-name=: The agent name associated with this request, used for observability.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --payment-connector-id=: The ID of the payment connector.
        --payment-instrument-id=!: The ID of the payment instrument to retrieve.
        --payment-manager-arn=!: The ARN of the payment manager that owns this payment instrument.
        --user-id=: The user ID associated with this payment instrument.
    - name: get-payment-instrument-balance
      description: Get the balance of a payment instrument.
      flags:
        --agent-name=: The agent name associated with this request, used for observability.
        --chain=!: The specific blockchain chain to query balance on.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --payment-connector-id=!: The ID of the payment connector associated with this instrument.
        --payment-instrument-id=!: The ID of the payment instrument to query balance for.
        --payment-manager-arn=!: The ARN of the payment manager that owns this payment instrument.
        --token=!: The token to query balance for.
        --user-id=: The user ID associated with this payment instrument.
      completion:
        flag:
            chain:
                - BASE
                - BASE_SEPOLIA
                - ETHEREUM
                - SOLANA
                - SOLANA_DEVNET
            token:
                - USDC
    - name: get-payment-session
      description: Get a payment session.
      flags:
        --agent-name=: The agent name associated with this request, used for observability.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --payment-manager-arn=!: The ARN of the payment manager that owns this session.
        --payment-session-id=!: The ID of the payment session to retrieve.
        --user-id=: The user ID associated with this payment session.
    - name: get-recommendation
      description: Retrieves detailed information about a recommendation, including its configuration, status, and results.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --recommendation-id=!: The unique identifier of the recommendation to retrieve.
    - name: get-resource-api-key
      description: Retrieves the API key associated with an API key credential provider.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-credential-provider-name=!: The credential provider name for the resource from which you are retrieving the API key.
        --workload-identity-token=!: The identity token of the workload from which you want to retrieve the API key.
    - name: get-resource-oauth2-token
      description: Returns the OAuth 2.0 token of the provided resource.
      flags:
        --audiences=:
            description: The audiences to include in the token request.
            nargs: -1
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --custom-parameters=: A map of custom parameters to include in the authorization request to the resource credential provider.
        --custom-state=: An opaque string that will be sent back to the callback URL provided in resourceOauth2ReturnUrl.
        --force-authentication: Indicates whether to always initiate a new three-legged OAuth (3LO) flow, regardless of any existing session.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --no-force-authentication: Indicates whether to always initiate a new three-legged OAuth (3LO) flow, regardless of any existing session.
        --oauth2-flow=!: The type of flow to be performed.
        --resource-credential-provider-name=!: The name of the resource's credential provider.
        --resource-oauth2-return-url=: The callback URL to redirect to after the OAuth 2.0 token retrieval is complete.
        --resources=:
            description: The resources to include in the token request.
            nargs: -1
        --scopes=!:
            description: The OAuth scopes being requested.
            nargs: -1
        --session-uri=: Unique identifier for the user's authentication session for retrieving OAuth2 tokens.
        --workload-identity-token=!: The identity token of the workload from which you want to retrieve the OAuth2 token.
      completion:
        flag:
            oauth2-flow:
                - USER_FEDERATION
                - M2M
                - ON_BEHALF_OF_TOKEN_EXCHANGE
    - name: get-resource-payment-token
      description: Generates authentication tokens for payment providers that use vendor-specific authentication mechanisms.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --payment-token-request=!: Vendor-specific token request input.
        --resource-credential-provider-name=!: Name of the payment credential provider to use.
        --workload-identity-token=!: Workload access token for authorization.
    - name: get-workload-access-token
      description: Obtains a workload access token for agentic workloads not acting on behalf of a user.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --workload-name=!: The unique identifier for the registered workload.
    - name: get-workload-access-token-for-jwt
      description: Obtains a workload access token for agentic workloads acting on behalf of a user, using a JWT token.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --user-token=!: The OAuth 2.0 token issued by the user's identity provider.
        --workload-name=!: The unique identifier for the registered workload.
    - name: get-workload-access-token-for-user-id
      description: Obtains a workload access token for agentic workloads acting on behalf of a user, using the user's ID.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --user-id=!: The ID of the user for whom you are retrieving the access token.
        --workload-name=!: The name of the workload from which you want to retrieve the access token.
    - name: invoke-agent-runtime
      description: Sends a request to an agent or tool hosted in an Amazon Bedrock AgentCore Runtime and receives responses in real-time.
      flags:
        --accept=: The desired MIME type for the response from the agent runtime.
        --account-id=: The identifier of the Amazon Web Services account for the agent runtime resource.
        --agent-runtime-arn=!: The identifier of the agent runtime to invoke.
        --baggage=: Additional context information for distributed tracing.
        --content-type=: The MIME type of the input data in the payload.
        --mcp-protocol-version=: The version of the MCP protocol being used.
        --mcp-session-id=: The identifier of the MCP session.
        --payload=!: The input data to send to the agent runtime.
        --qualifier=: The qualifier to use for the agent runtime.
        --runtime-session-id=: The identifier of the runtime session.
        --runtime-user-id=: The identifier of the runtime user.
        --trace-id=: The trace identifier for request tracking.
        --trace-parent=: The parent trace information for distributed tracing.
        --trace-state=: The trace state information for distributed tracing.
      completion:
        positional:
            - - $files
    - name: invoke-browser
      description: Invokes an operating system-level action on a browser session in Amazon Bedrock AgentCore.
      flags:
        --action=!: The browser action to perform.
        --browser-identifier=!: The unique identifier of the browser associated with the session.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --session-id=!: The unique identifier of the browser session on which to perform the action.
    - name: list-ab-tests
      description: Lists all A/B tests in the account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in the response.
        --next-token=: If the total number of results is greater than the `maxResults` value provided in the request, enter the token returned in the `nextToken` field in the response in this field to return the next batch of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-actors
      description: Lists all actors in an AgentCore Memory resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --memory-id=!: The identifier of the AgentCore Memory resource for which to list actors.
        --next-token=: The token for the next set of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-batch-evaluations
      description: Lists all batch evaluations in the account, providing summary information about each evaluation's status and configuration.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in the response.
        --next-token=: If the total number of results is greater than the `maxResults` value provided in the request, enter the token returned in the `nextToken` field in the response in this field to return the next batch of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
    - name: list-browser-sessions
      description: Retrieves a list of browser sessions in Amazon Bedrock AgentCore that match the specified criteria.
      flags:
        --browser-identifier=!: The unique identifier of the browser to list sessions for.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: The token for the next set of results.
        --status=: The status of the browser sessions to list.
      completion:
        flag:
            status:
                - READY
                - TERMINATED
    - name: list-code-interpreter-sessions
      description: Retrieves a list of code interpreter sessions in Amazon Bedrock AgentCore that match the specified criteria.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --code-interpreter-identifier=!: The unique identifier of the code interpreter to list sessions for.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: The token for the next set of results.
        --status=: The status of the code interpreter sessions to list.
      completion:
        flag:
            status:
                - READY
                - TERMINATED
    - name: list-events
      description: Lists events in an AgentCore Memory resource based on specified criteria.
      flags:
        --actor-id=!: The identifier of the actor for which to list events.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --filter=: Filter criteria to apply when listing events.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --include-payloads: Specifies whether to include event payloads in the response.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --memory-id=!: The identifier of the AgentCore Memory resource for which to list events.
        --next-token=: The token for the next set of results.
