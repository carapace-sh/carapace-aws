# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: sagemakerjobruntime
description: Sagemaker Job Runtime Service
commands:
    - name: complete-rollout
      description: Marks a rollout as complete, indicating that no further turns will be appended to the trajectory.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --job-arn=!: The job ARN.
        --status=: The target status for the trajectory.
        --trajectory-id=!: The trajectory ID to mark as complete.
      completion:
        flag:
            status:
                - ready
                - failed
    - name: sample
      description: Sends an inference request to the model during a job execution.
      flags:
        --body=!: The raw inference request body in OpenAI-compatible JSON format.
        --job-arn=!: The job ARN that identifies which model session to route the inference request to.
        --trajectory-id=!: The trajectory ID for grouping turns into a single rollout.
      completion:
        positional:
            - - $files
    - name: sample-with-response-stream
      description: Sends a streaming inference request to the model during a job execution.
      flags:
        --body=!: The raw inference request body in OpenAI-compatible JSON format.
        --job-arn=!: The job ARN that identifies which model session to route the inference request to.
        --trajectory-id=!: The trajectory ID for grouping turns into a single rollout.
      completion:
        positional:
            - - $files
    - name: update-reward
      description: Updates the reward values for a trajectory and transitions it to reward-received status, signaling that it is eligible for processing.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier that you provide to ensure the idempotency of the request.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --job-arn=!: The job ARN.
        --rewards=!:
            description: The list of reward values to assign to this trajectory.
            nargs: -1
        --trajectory-id=!: The trajectory ID to update with reward values.
