# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: supportauthz
description: SupportAuthZ
commands:
    - name: create-support-permit
      description: Creates a support permit that authorizes an AWS support operator to perform specified actions on specified resources.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --client-token=: A unique, case-sensitive identifier to ensure that the operation completes no more than one time.
        --description=: A human-readable description of why this permit is being created.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --name=!: A customer-chosen name for the support permit.
        --permit=!: The permit definition specifying the actions, resources, and time-window conditions that the support operator is authorized to use.
        --signing-key-info=!: The signing key information used to sign the permit.
        --support-case-display-id=: The display identifier of the AWS Support case associated with this permit.
        --tags=: The tags to associate with the support permit on creation.
    - name: delete-support-permit
      description: Deletes a support permit, revoking the authorization previously granted to the AWS support operator.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --support-permit-identifier=!: The Amazon Resource Name (ARN) or name of the support permit to delete.
    - name: get-action
      description: Retrieves the description of a specific support action.
      flags:
        --action=!: The name of the support action to retrieve.
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
    - name: get-support-permit
      description: Retrieves the details of a support permit by its ARN or name.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --support-permit-identifier=!: The ARN or name of the support permit to retrieve.
    - name: list-actions
      description: Lists available support actions for a specified AWS service.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --service=!: The name of the AWS service for which to list available support actions.
        --starting-token=: A token to specify where to start paginating.
    - name: list-support-permit-requests
      description: Lists permit requests from AWS support operators.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
        --support-case-display-id=: Filters the results by support case display identifier.
    - name: list-support-permits
      description: Lists all support permits in the caller's account.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --max-items=: The  total number of items to return in the command's output.
        --max-results=: The maximum number of results to return in a single call.
        --next-token=: The token for the next page of results.
        --page-size=: The size of each page to get in the AWS service call.
        --starting-token=: A token to specify where to start paginating.
        --support-permit-statuses=:
            description: Filters the results by support permit status.
            nargs: -1
    - name: list-tags-for-resource
      description: Lists the tags associated with a support permit resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The ARN of the resource to list tags for.
    - name: reject-support-permit-request
      description: Rejects a permit request from an AWS support operator.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --request-arn=!: The ARN of the permit request to reject.
    - name: tag-resource
      description: Adds or overwrites one or more tags for a support permit resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The ARN of the resource to tag.
        --tags=!: The tags to add to the resource.
    - name: untag-resource
      description: Removes one or more tags from a support permit resource.
      flags:
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
        --resource-arn=!: The ARN of the resource to untag.
        --tag-keys=!:
            description: The tag keys to remove from the resource.
            nargs: -1
