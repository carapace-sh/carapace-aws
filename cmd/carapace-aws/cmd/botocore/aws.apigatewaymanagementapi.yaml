# yaml-language-server: $schema=https://carapace.sh/schemas/command.json
name: apigatewaymanagementapi
description: AmazonApiGatewayManagementApi
commands:
    - name: delete-connection
      description: Delete the connection with the provided id.
      flags:
        --cli-error-format=: The formatting style for error output
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --connection-id=!: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
      completion:
        flag:
            cli-error-format:
                - legacy
                - json
                - yaml
                - text
                - table
                - enhanced
    - name: get-connection
      description: Get information about the connection with the provided id.
      flags:
        --cli-error-format=: The formatting style for error output
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --connection-id=!: ""
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
      completion:
        flag:
            cli-error-format:
                - legacy
                - json
                - yaml
                - text
                - table
                - enhanced
    - name: post-to-connection
      description: Sends the provided data to the specified connection.
      flags:
        --cli-error-format=: The formatting style for error output
        --cli-input-json=: Read arguments from the JSON string provided.
        --cli-input-yaml=: Read arguments from the YAML string provided.
        --connection-id=!: The identifier of the connection that a specific client is using.
        --data=!: The data to be sent to the client specified by its connection id.
        --generate-cli-skeleton: Prints a JSON skeleton to standard output without sending an API request.
      completion:
        flag:
            cli-error-format:
                - legacy
                - json
                - yaml
                - text
                - table
                - enhanced
